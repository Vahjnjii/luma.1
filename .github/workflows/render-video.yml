name: Render Video

on:
  issue_comment:
    types: [created]

jobs:
  render:
    if: startsWith(github.event.comment.body, 'LUMA_VID:')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install FFmpeg + Python tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq

      - name: Parse payload
        id: p
        run: |
          COMMENT='${{ github.event.comment.body }}'
          JSON="${COMMENT#LUMA_VID:}"
          parse() { echo "$JSON" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).$1||'')"; }
          echo "jobId=$(parse jobId)"           >> $GITHUB_OUTPUT
          echo "text=$(parse overlayText)"      >> $GITHUB_OUTPUT
          echo "duration=$(parse duration)"     >> $GITHUB_OUTPUT
          echo "deviceId=$(parse deviceId)"     >> $GITHUB_OUTPUT

      - name: Generate background video with FFmpeg
        run: |
          DURATION="${{ steps.p.outputs.duration }}"
          OVERLAY_TEXT="${{ steps.p.outputs.text }}"
          JOB_ID="${{ steps.p.outputs.jobId }}"

          # Safe text for drawtext filter
          SAFE_TEXT=$(echo "$OVERLAY_TEXT" \
            | sed "s/'/'\\\\''/g" \
            | sed 's/:/\\:/g' \
            | sed 's/\[/\\[/g' \
            | sed 's/\]/\\]/g' \
            | sed 's/,/\\,/g')

          # Create an abstract animated background + text overlay
          # Using lavfi (FFmpeg's virtual input) — zero external files needed!
          ffmpeg -y \
            -f lavfi -i "color=c=0x030310:size=1080x1920:rate=30" \
            -f lavfi -i "nullsrc=size=1080x1920:rate=30" \
            -filter_complex "
              [0:v]
              geq=r='128+64*sin(2*PI*t/4+X/200)':
                  g='90+40*sin(2*PI*t/5+Y/200)':
                  b='200+55*sin(2*PI*t/3)',
              hue=s=1.2,
              vignette=PI/4,
              drawtext=
                text='${SAFE_TEXT}':
                fontsize=58:
                fontcolor=white@0.95:
                shadowcolor=black@0.7:
                shadowx=3:
                shadowy=3:
                borderw=2:
                bordercolor=black@0.4:
                x=(w-text_w)/2:
                y=h-250:
                line_spacing=14:
                fix_bounds=1
              [out]
            " \
            -map "[out]" \
            -t "$DURATION" \
            -an \
            -c:v libx264 -preset fast -crf 22 \
            -pix_fmt yuv420p \
            -movflags +faststart \
            output.mp4

          echo "VIDEO_READY=true" >> $GITHUB_ENV

      - name: Upload video to GitHub Release (free storage)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          REPO="${{ github.repository }}"
          TAG="video-${JOB_ID}"
          FILENAME="${TAG}.mp4"

          # Create release tag
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "Video $JOB_ID" \
            --notes "Auto-generated by LUMA" \
            --latest=false 2>/dev/null || true

          # Upload the video file
          gh release upload "$TAG" output.mp4#"$FILENAME" \
            --repo "$REPO" \
            --clobber

          VIDEO_URL="https://github.com/${REPO}/releases/download/${TAG}/${FILENAME}"
          echo "VIDEO_URL=$VIDEO_URL" >> $GITHUB_ENV
          echo "✓ Uploaded to: $VIDEO_URL"

      - name: Write status JSON
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          DEVICE_ID="${{ steps.p.outputs.deviceId }}"
          OVERLAY="${{ steps.p.outputs.text }}"
          mkdir -p api/status

          node -e "
            const data = {
              jobId:     process.env.JOB_ID,
              deviceId:  process.env.DEVICE_ID,
              status:    'done',
              template:  'vidgen',
              total:     1,
              done:      1,
              label:     process.env.OVERLAY.slice(0, 80),
              timestamp: Date.now(),
              videoUrl:  process.env.VIDEO_URL,
              results:   []
            };
            require('fs').writeFileSync(
              \`api/status/\${process.env.JOB_ID}.json\`,
              JSON.stringify(data)
            );
            console.log('✓ Status written');
          " \
          JOB_ID="$JOB_ID" DEVICE_ID="$DEVICE_ID" \
          OVERLAY="$OVERLAY" VIDEO_URL="$VIDEO_URL"

      - name: Commit status
        run: |
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || git commit -m "feat: video job ${{ steps.p.outputs.jobId }}"
          git push

      - name: Write error status on failure
        if: failure()
        run: |
          JOB="${{ steps.p.outputs.jobId }}"
          mkdir -p api/status
          echo "{\"status\":\"error\",\"jobId\":\"$JOB\",\"error\":\"Video render failed. Check Actions logs.\",\"results\":[],\"done\":0,\"total\":1}" \
            > api/status/$JOB.json
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || git commit -m "err: video job $JOB"
          git push
