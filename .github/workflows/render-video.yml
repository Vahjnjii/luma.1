name: Render Video

on:
  issue_comment:
    types: [created]

jobs:
  render:
    if: startsWith(github.event.comment.body, 'LUMA_VID:')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg -qq

      # ── Safe parse: env var avoids shell injection from comment body ──
      - name: Parse payload
        id: p
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          node << 'EOF'
          const body = process.env.COMMENT_BODY;
          const json = body.slice(body.indexOf(':') + 1);
          let d;
          try { d = JSON.parse(json); } catch(e) { console.error('Bad JSON:', e.message); process.exit(1); }
          const fs = require('fs');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `jobId=${d.jobId||''}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deviceId=${d.deviceId||''}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `duration=${d.duration||30}\n`);
          // Write overlay text to file — avoids any quoting issues in shell steps
          fs.writeFileSync('/tmp/overlay_text.txt', d.overlayText || '');
          console.log('Parsed jobId:', d.jobId, '| duration:', d.duration, '| text:', (d.overlayText||'').slice(0,60));
          EOF

      # ── Write "processing" status immediately ──
      - name: Write processing status
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          DEVICE="${{ steps.p.outputs.deviceId }}"
          mkdir -p api/status
          printf '{"jobId":"%s","deviceId":"%s","status":"processing","template":"vidgen","total":1,"done":0,"label":"Rendering video\u2026","timestamp":%s,"results":[]}' \
            "$JOB_ID" "$DEVICE" "$(date +%s)000" > "api/status/${JOB_ID}.json"
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || (git commit -m "start: video ${JOB_ID}" && git push)

      # ── Generate video with FFmpeg ──
      # Text is passed via drawtext textfile= option — avoids ALL escaping issues
      - name: Generate background video
        run: |
          DURATION="${{ steps.p.outputs.duration }}"

          # Use textfile= so FFmpeg reads the text from disk — no shell quoting needed
          ffmpeg -y \
            -f lavfi -i "color=c=0x030310:size=1080x1920:rate=30" \
            -filter_complex "
              [0:v]
              geq=r='128+64*sin(2*PI*t/4+X/200)':
                  g='90+40*sin(2*PI*t/5+Y/200)':
                  b='200+55*sin(2*PI*t/3)',
              hue=s=1.2,
              vignette=PI/4,
              drawtext=
                textfile=/tmp/overlay_text.txt:
                fontsize=58:
                fontcolor=white@0.95:
                shadowcolor=black@0.7:
                shadowx=3:
                shadowy=3:
                borderw=2:
                bordercolor=black@0.4:
                x=(w-text_w)/2:
                y=h-250:
                line_spacing=14:
                fix_bounds=1
              [out]
            " \
            -map "[out]" \
            -t "$DURATION" \
            -an \
            -c:v libx264 -preset fast -crf 22 \
            -pix_fmt yuv420p \
            -movflags +faststart \
            output.mp4

          echo "VIDEO_READY=true" >> $GITHUB_ENV

      # ── Upload to GitHub Releases (free unlimited storage) ──
      - name: Upload video to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          REPO="${{ github.repository }}"
          TAG="video-${JOB_ID}"
          FILENAME="${TAG}.mp4"

          gh release create "$TAG" \
            --repo "$REPO" \
            --title "Video $JOB_ID" \
            --notes "Auto-generated by LUMA" \
            --latest=false 2>/dev/null || true

          gh release upload "$TAG" "output.mp4#${FILENAME}" \
            --repo "$REPO" \
            --clobber

          VIDEO_URL="https://github.com/${REPO}/releases/download/${TAG}/${FILENAME}"
          echo "VIDEO_URL=$VIDEO_URL" >> $GITHUB_ENV
          echo "Video uploaded to: $VIDEO_URL"

      # ── Write final status JSON ──
      - name: Write status JSON
        env:
          JOB_ID:    ${{ steps.p.outputs.jobId }}
          DEVICE_ID: ${{ steps.p.outputs.deviceId }}
        run: |
          LABEL=$(head -c 80 /tmp/overlay_text.txt)
          node -e "
            const fs  = require('fs');
            const jid = process.env.JOB_ID;
            const did = process.env.DEVICE_ID;
            const url = process.env.VIDEO_URL;
            const lbl = process.env.LABEL || 'Video';
            fs.mkdirSync('api/status', { recursive: true });
            fs.writeFileSync('api/status/' + jid + '.json', JSON.stringify({
              jobId:     jid,
              deviceId:  did,
              status:    'done',
              template:  'vidgen',
              total:     1,
              done:      1,
              label:     lbl,
              timestamp: Date.now(),
              videoUrl:  url,
              results:   []
            }));
            console.log('Status written for', jid);
          " LABEL="$LABEL"

      - name: Commit status
        run: |
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || (git commit -m "video: ${{ steps.p.outputs.jobId }}" && git push)

      # ── On any failure: write error status so UI stops spinning ──
      - name: Write error status on failure
        if: failure()
        env:
          JOB_ID: ${{ steps.p.outputs.jobId }}
        run: |
          mkdir -p api/status
          node -e "
            const fs=require('fs'),j=process.env.JOB_ID;
            fs.writeFileSync('api/status/'+j+'.json', JSON.stringify({
              status:'error', jobId:j,
              error:'Video render failed. Check Actions logs.',
              results:[], done:0, total:1, timestamp:Date.now()
            }));
          "
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || (git commit -m "err: video ${JOB_ID}" && git push)
