name: Render Images

on:
  issue_comment:
    types: [created]

jobs:
  render:
    if: startsWith(github.event.comment.body, 'LUMA_IMG:')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Safe parse: env var avoids shell injection from comment body ──
      - name: Parse payload
        id: p
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          node << 'EOF'
          const body = process.env.COMMENT_BODY;
          const json = body.slice(body.indexOf(':') + 1);
          let d;
          try { d = JSON.parse(json); } catch(e) { console.error('Bad JSON:', e.message); process.exit(1); }
          const fs = require('fs');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `jobId=${d.jobId||''}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deviceId=${d.deviceId||''}\n`);
          fs.writeFileSync('/tmp/input_text.txt', d.text || '');
          console.log('Parsed jobId:', d.jobId, '| text chars:', (d.text||'').length);
          EOF

      # ── Write "processing" immediately so UI shows progress spinner ──
      - name: Write processing status
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          DEVICE="${{ steps.p.outputs.deviceId }}"
          mkdir -p api/status
          printf '{"jobId":"%s","deviceId":"%s","status":"processing","template":"imggen","total":0,"done":0,"label":"Processing\u2026","timestamp":%s,"results":[]}' \
            "$JOB_ID" "$DEVICE" "$(date +%s)000" > "api/status/${JOB_ID}.json"
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || (git commit -m "start: ${JOB_ID}" && git push)

      - name: Write generator script
        run: |
          cat > /tmp/gen.mjs << 'JSEOF'
          import fs from 'fs';

          const jobId    = process.env.JOB_ID;
          const text     = fs.readFileSync('/tmp/input_text.txt', 'utf8').trim();
          const deviceId = process.env.DEVICE_ID;
          const worker   = process.env.WORKER_URL;

          if (!jobId || !text) { console.error('Missing jobId or text'); process.exit(1); }
          if (!worker)         { console.error('Missing WORKER_URL secret'); process.exit(1); }

          // ── Fetch posts from Worker (pure JS split — no AI timeout) ──
          let posts = [];
          try {
            const res  = await fetch(worker + '/ai', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Worker error ' + res.status);
            posts = data.posts || [];
            console.log('Worker returned ' + posts.length + ' post(s)');
          } catch(e) {
            console.error('Worker error:', e.message);
            process.exit(1);
          }
          if (!posts.length) { console.error('No posts from Worker'); process.exit(1); }

          // ── Helpers ──────────────────────────────────────────────────────
          const cleanText = t => (t||'').replace(/\*\*/g,'').trim();

          // Strip leading post numbers: "1." "1)" "(1)" "Post 1:" "第一：" etc.
          function stripPostNumber(title) {
            return (title||'')
              .replace(/^\s*(?:post\s*)?\d+\s*[.:)\-]\s*/i, '')
              .replace(/^\s*\(\d+\)\s*/,                     '')
              .replace(/^\s*第\s*[\d一二三四五六七八九十百]+\s*[：:条篇部张节]\s*/u, '')
              .replace(/^\s*[一二三四五六七八九十][、。：\s]/u, '')
              .replace(/^\s*#+\s*/,                          '')
              .trim();
          }

          // Decode HTML entities (e.g. &#128512; → 😀) the AI sometimes outputs
          function decodeEntities(str) {
            if (!str) return str;
            return str
              .replace(/&#(\d+);/g,           (_, n) => { try { return String.fromCodePoint(parseInt(n,10)); } catch { return ''; } })
              .replace(/&#x([0-9a-fA-F]+);/gi, (_, h) => { try { return String.fromCodePoint(parseInt(h,16)); } catch { return ''; } });
          }

          // ── Normalise posts ──────────────────────────────────────────────
          posts = posts.map(p => ({
            title:   decodeEntities(stripPostNumber(p.title   || '')),
            content: (p.content || []).map(l => decodeEntities(l || '')),
          }));

          // ── Bold: zodiac / planet / key words ────────────────────────────
          const ZODIAC_WORDS = [
            // English
            'Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces',
            // Chinese (Simplified + Traditional)
            '白羊座','金牛座','双子座','巨蟹座','狮子座','处女座','天秤座','天蝎座','射手座','摩羯座','水瓶座','双鱼座',
            '牡羊座','雙子座','獅子座','處女座','天蠍座','雙魚座',
            // Japanese
            '牡牛座','蟹座','乙女座','蠍座','山羊座','魚座',
            // Hindi/Marathi
            'मेष','वृषभ','मिथुन','कर्क','कर्कट','सिंह','कन्या','तुला','वृश्चिक','धनु','मकर','कुंभ','मीन',
            // Tamil
            'மேஷம்','ரிஷபம்','மிதுனம்','கடகம்','சிம்மம்','கன்னி','துலாம்','விருச்சிகம்','தனுசு','மகரம்','கும்பம்','மீனம்',
            // Malayalam
            'മേഷം','ഇടവം','മിഥുനം','കർക്കടകം','ചിങ്ങം','കന്നി','തുലാം','വൃശ്ചികം','ധനു','മകരം','കുംഭം','മീനം',
            // Telugu
            'మేషం','వృషభం','మిథునం','కర్కాటకం','సింహం','కన్య','తుల','వృశ్చికం','ధనుస్సు','మకరం','కుంభం','మీనం',
            // Kannada
            'ಮೇಷ','ವೃಷಭ','ಮಿಥುನ','ಕರ್ಕಾಟಕ','ಸಿಂಹ','ಕನ್ಯಾ','ತುಲಾ','ವೃಶ್ಚಿಕ','ಧನು','ಮಕರ','ಕುಂಭ','ಮೀನ',
            // Bengali
            'মেষ','বৃষভ','মিথুন','কর্কট','সিংহ','কন্যা','তুলা','বৃশ্চিক','ধনু','মকর','কুম্ভ','মীন',
            // German
            'Widder','Stier','Zwillinge','Krebs','Löwe','Jungfrau','Waage','Skorpion','Schütze','Steinbock','Wassermann','Fische',
            // Spanish / French
            'Tauro','Géminis','Cáncer','Sagitario','Capricornio','Acuario','Piscis',
            'Bélier','Taureau','Gémeaux','Vierge','Balance','Scorpion','Sagittaire','Capricorne','Verseau','Poissons',
            // Arabic
            'الحمل','الثور','الجوزاء','السرطان','الأسد','العذراء','الميزان','العقرب','القوس','الجدي','الدلو','الحوت',
          ];
          const PLANET_WORDS = [
            'Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Rahu','Ketu','Uranus','Neptune','Pluto',
            'सूर्य','चंद्र','मंगल','बुध','गुरु','शुक्र','शनि','राहु','केतु',
            '太阳','月亮','火星','水星','木星','金星','土星',
            'Sonne','Mond','Merkur','Jupiter','Venus','Saturn',
            'الشمس','القمر','المريخ','عطارد','المشتري','الزهرة','زحل',
          ];
          const _allSpecial = [...ZODIAC_WORDS, ...PLANET_WORDS]
            .sort((a,b) => b.length - a.length)
            .map(w => w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
          const SPECIAL_RE = new RegExp('(?<!\\*\\*)(' + _allSpecial.join('|') + ')(?!\\*\\*)', 'gu');
          const TIMING_RE  = /(?<!\*\*)\b(Today|Tomorrow|Lucky|Unlucky|Auspicious|Inauspicious|Important|Warning|Alert|Special|Excellent|Favorable|Unfavorable|Good|Bad|Critical|Best|Worst)\b(?!\*\*)/gi;

          function applyBold(t) {
            if (!t) return t;
            t = t.replace(SPECIAL_RE, '**$1**');
            t = t.replace(/(?<!\*)\b([A-Z]{3,})\b(?!\*)/g, '**$1**');
            t = t.replace(/(?<!\*)\b(\d+(?:\.\d+)?\s*[%₹$€£]|[₹$€£]\s*\d+(?:\.\d+)?|\d+(?:st|nd|rd|th))\b(?!\*)/g, '**$1**');
            t = t.replace(TIMING_RE, '**$1**');
            t = t.replace(/\*{4}/g,'**').replace(/\*\*(\s+)\*\*/g,'$1');
            return t;
          }

          posts = posts.map(p => ({
            title:   applyBold(p.title),
            content: p.content.map(l => l ? applyBold(l) : l),
          }));

          // ── Emoji ensure: every non-empty line gets exactly one emoji ────
          // KEY FIX: check if ANY emoji exists ANYWHERE in the line.
          // If yes → leave line untouched (no duplicate emoji).
          // If no  → append one relevant emoji at the end.
          const HAS_EMOJI_ANYWHERE = /\p{Emoji_Presentation}|\p{Emoji}\uFE0F/u;
          function topicEmoji(t) {
            const s = (t||'').toLowerCase();
            if (/aries|taurus|gemini|cancer|leo|virgo|libra|scorpio|sagittarius|capricorn|aquarius|pisces|白羊|金牛|双子|巨蟹|狮子|处女|天秤|天蝎|射手|摩羯|水瓶|双鱼|मेष|वृषभ|मिथुन|कर्क|सिंह|zodiac|rashi|horoscope|rashifal/i.test(s)) return '🔮';
            if (/lucky|luck|fortune|auspicious|शुभ|吉|भाग्य/i.test(s))  return '🍀';
            if (/warning|caution|alert|danger|beware|सावधान|注意/i.test(s)) return '⚠️';
            if (/love|heart|romance|प्रेम|愛|liebe|amour|relationship/i.test(s)) return '❤️';
            if (/money|wealth|finance|earn|profit|धन|钱|geld|financial/i.test(s)) return '💰';
            if (/health|fitness|body|स्वास्थ्य|健康|gesundheit/i.test(s)) return '💪';
            if (/career|job|work|business|करियर|事業|karriere/i.test(s)) return '💼';
            if (/study|learn|education|पढ़|学习|lernen|knowledge/i.test(s)) return '📚';
            if (/travel|journey|trip|यात्रा|旅行|reise/i.test(s)) return '✈️';
            if (/family|home|house|परिवार|家庭|familie/i.test(s)) return '🏠';
            if (/sun|solar|surya|सूर्य|太阳|sonne/i.test(s)) return '☀️';
            if (/moon|lunar|chandra|चंद्र|月亮|mond/i.test(s)) return '🌙';
            if (/fire|energy|passion|जोश|火|feuer/i.test(s)) return '🔥';
            if (/win|success|victory|विजय|成功|erfolg/i.test(s)) return '🏆';
            if (/nature|flower|garden|प्रकृति|自然|natur/i.test(s)) return '🌸';
            return '✨';
          }
          function ensureEmoji(line) {
            if (!line || !line.trim()) return line;
            const plain = cleanText(line);
            // If line already has ANY emoji anywhere → don't add another
            if (HAS_EMOJI_ANYWHERE.test(plain)) return line;
            // No emoji at all → append one relevant emoji at the end
            return line.trimEnd() + ' ' + topicEmoji(plain);
          }
          posts = posts.map(p => ({
            title:   ensureEmoji(p.title),
            content: p.content.map(l => ensureEmoji(l)),
          }));

          // ════════════════════════════════════════════════════════════════
          // SVG RENDERER — based on reference implementation
          // Uses system emoji font stack: no CDN, no PNG embeds, always works.
          // Emoji are part of the text, rendered by 'Apple Color Emoji' etc.
          // renderLine handles **bold** markers only — simple, clean, correct.
          // ════════════════════════════════════════════════════════════════
          const EMOJI_FONT = `'Apple Color Emoji','Noto Color Emoji','Segoe UI Emoji','Segoe UI Symbol'`;
          const BASE_FONT  = `'Syne','DM Sans',ui-sans-serif,system-ui,sans-serif,${EMOJI_FONT}`;

          function xe(s) {
            return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
          }

          function parseBold(text) {
            const segs = [], re = /\*\*(.*?)\*\*/g;
            let last = 0, m;
            while ((m = re.exec(text)) !== null) {
              if (m.index > last) segs.push({ t: text.slice(last, m.index), bold: false });
              if (m[1])           segs.push({ t: m[1], bold: true });
              last = re.lastIndex;
            }
            if (last < text.length) segs.push({ t: text.slice(last), bold: false });
            return segs.filter(s => s.t);
          }

          // renderLine: bold-aware, emoji stays in text via font stack
          // No CDN, no splitSegments, no complex emoji logic — clean and correct.
          function renderLine(px, y, fs, fw, fill, rawText) {
            const segs    = parseBold(rawText);
            const hasBold = segs.some(s => s.bold);

            if (!hasBold) {
              return `<text x="${px}" y="${y}" font-family="${BASE_FONT}" font-size="${fs}" font-weight="${fw}" fill="${fill}" xml:space="preserve">${xe(cleanText(rawText))}</text>`;
            }
            const spans = segs.map(s => {
              const w = s.bold ? 900 : fw;
              const c = s.bold ? '#FFFFFF' : fill;
              return `<tspan font-weight="${w}" fill="${c}">${xe(s.t)}</tspan>`;
            }).join('');
            return `<text x="${px}" y="${y}" font-family="${BASE_FONT}" font-size="${fs}" font-weight="${fw}" fill="${fill}" xml:space="preserve">${spans}</text>`;
          }

          function isWide(ch) {
            const cp = ch.codePointAt(0);
            return (
              cp >= 0x1F000 ||
              (cp >= 0x2600  && cp <= 0x27FF) ||
              (cp >= 0x4E00  && cp <= 0x9FFF) ||
              (cp >= 0x3400  && cp <= 0x4DBF) ||
              (cp >= 0x20000 && cp <= 0x2FA1F)||
              (cp >= 0x3040  && cp <= 0x30FF) ||
              (cp >= 0xAC00  && cp <= 0xD7AF) ||
              (cp >= 0xFF00  && cp <= 0xFFEF) ||
              (cp >= 0x3000  && cp <= 0x303F) ||
              (cp >= 0x3200  && cp <= 0x33FF)
            );
          }
          function charVisLen(str) {
            let n = 0;
            for (const ch of [...(str||'')]) n += isWide(ch) ? 2 : 1;
            return n;
          }

          function wrapLatin(text, cpl) {
            const words = text.split(' '), lines = [];
            let cur = '', curLen = 0;
            for (const word of words) {
              const wLen = charVisLen(cleanText(word));
              const sep  = cur ? 1 : 0;
              if (curLen + sep + wLen > cpl && cur) { lines.push(cur); cur = word; curLen = wLen; }
              else { cur = cur ? `${cur} ${word}` : word; curLen += sep + wLen; }
            }
            if (cur) lines.push(cur);
            return lines.length ? lines : [''];
          }

          function wrapCJK(text, cpl) {
            const lines = []; let curRaw = '', curLen = 0, inBold = false;
            const chars = [...text]; let i = 0;
            while (i < chars.length) {
              if (chars[i] === '*' && chars[i+1] === '*') { curRaw += '**'; inBold = !inBold; i += 2; continue; }
              const ch = chars[i], chLen = isWide(ch) ? 2 : 1;
              if (curLen + chLen > cpl && cleanText(curRaw).length > 0) {
                if (inBold) curRaw += '**';
                lines.push(curRaw);
                curRaw = inBold ? '**' + ch : ch; curLen = chLen;
              } else { curRaw += ch; curLen += chLen; }
              i++;
            }
            if (cleanText(curRaw)) lines.push(curRaw);
            return lines.length ? lines : [''];
          }

          function smartWrap(text, cpl) {
            if (!text) return [''];
            const plain = cleanText(text);
            const wideCount  = [...plain].filter(isWide).length;
            const spaceCount = (plain.match(/ /g)||[]).length;
            const isCJK = wideCount > plain.length * 0.3 || (wideCount > 2 && spaceCount < 2);
            return isCJK ? wrapCJK(text, cpl) : wrapLatin(text, cpl);
          }

          async function makeSVG(post) {
            const W = 1080, H = 1920, PX = 110, PY = 130;
            const CW = W - PX * 2, BOTTOM = H - PY;

            const rawTitle = (post.title  || '').trim();
            const content  = (post.content|| []);
            const visLen   = charVisLen(cleanText(rawTitle)) + charVisLen(content.map(l=>cleanText(l||'')).join(''));

            let ts, bs, tlh, blh, gap;
            if      (visLen < 80)  { ts=96; bs=62; tlh=134; blh=90; gap=76; }
            else if (visLen < 150) { ts=86; bs=55; tlh=120; blh=82; gap=68; }
            else if (visLen < 260) { ts=74; bs=49; tlh=104; blh=72; gap=58; }
            else if (visLen < 420) { ts=65; bs=44; tlh= 92; blh=64; gap=50; }
            else if (visLen < 620) { ts=55; bs=40; tlh= 80; blh=58; gap=44; }
            else if (visLen < 900) { ts=48; bs=35; tlh= 70; blh=50; gap=36; }
            else                   { ts=41; bs=31; tlh= 60; blh=44; gap=32; }

            const tCPL = Math.floor(CW / (ts * 0.50));
            const bCPL = Math.floor(CW / (bs * 0.50));

            const titleLines = smartWrap(rawTitle, tCPL);
            const bodyLines  = [];
            for (const line of content) {
              if (!cleanText(line||'')) { bodyLines.push({ raw:'', gap:true }); }
              else { for (const w of smartWrap(line, bCPL)) bodyLines.push({ raw:w, gap:false }); }
            }

            const titleH = titleLines.length * tlh;
            const bodyH  = bodyLines.reduce((s,l) => s + (l.gap ? blh*0.5 : blh), 0);
            const totalH = titleH + (bodyLines.length ? gap + bodyH : 0);
            let y = totalH > (H - PY*2)
              ? PY + ts
              : Math.max(PY + ts, Math.round((H - totalH) / 2) + ts);

            const els = [];

            for (const line of titleLines) {
              if (y > BOTTOM + ts) break;
              els.push(renderLine(PX, y, ts, 800, '#FFFFFF', line));
              y += tlh;
            }

            if (bodyLines.length) {
              const ay = y + Math.round(gap * 0.28);
              if (ay < BOTTOM)
                els.push(`<rect x="${PX}" y="${ay}" width="44" height="4" rx="2" fill="rgba(139,92,246,0.75)"/>`);
              y += gap;
            }

            for (const line of bodyLines) {
              if (!line.gap && y > BOTTOM + bs) break;
              if (!line.gap) els.push(renderLine(PX, y, bs, 400, 'rgba(255,255,255,0.85)', line.raw));
              y += line.gap ? Math.round(blh * 0.5) : blh;
            }

            const svgParts = [
              '<?xml version="1.0" encoding="UTF-8"?>',
              `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`,
              '<defs>',
              `  <linearGradient id="bg" x1="0" y1="0" x2="${W}" y2="${H}" gradientUnits="userSpaceOnUse">`,
              '  <stop offset="0%"   stop-color="#06020f"/>',
              '  <stop offset="55%"  stop-color="#080412"/>',
              '  <stop offset="100%" stop-color="#00091a"/>',
              '  </linearGradient>',
              `  <clipPath id="clip"><rect width="${W}" height="${H}"/></clipPath>`,
              '</defs>',
              `<rect width="${W}" height="${H}" fill="url(#bg)"/>`,
              '<g clip-path="url(#clip)">',
              ...els,
              '</g>',
              '</svg>',
            ];
            return svgParts.join('\n');
          }

          // ── Write results incrementally ───────────────────────────────────
          const dir = 'api/status';
          if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });

          const results = [];
          for (let i = 0; i < posts.length; i++) {
            const svg = await makeSVG(posts[i]);
            results.push({ title: cleanText(posts[i].title), svg });
            const isLast = i === posts.length - 1;
            fs.writeFileSync(`${dir}/${jobId}.json`, JSON.stringify({
              jobId, deviceId,
              status:    isLast ? 'done' : 'processing',
              template:  'imggen',
              total:     posts.length,
              done:      i + 1,
              label:     cleanText(posts[0]?.title || 'Session').slice(0, 80),
              timestamp: Date.now(),
              results:   results.map(r => ({ title: r.title, svg: r.svg })),
            }));
            console.log(`Image ${i+1}/${posts.length} written`);
          }
          console.log('Done: ' + results.length + ' image(s)');
          JSEOF

      - name: Run generator
        env:
          JOB_ID:     ${{ steps.p.outputs.jobId }}
          DEVICE_ID:  ${{ steps.p.outputs.deviceId }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: node /tmp/gen.mjs

      - name: Commit status
        run: |
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || (git commit -m "job: ${{ steps.p.outputs.jobId }}" && git push)

      - name: Write error on failure
        if: failure()
        env:
          JOB_ID: ${{ steps.p.outputs.jobId }}
        run: |
          mkdir -p api/status
          node -e "
            const fs=require('fs'),j=process.env.JOB_ID;
            fs.writeFileSync('api/status/'+j+'.json', JSON.stringify({
              status:'error', jobId:j,
              error:'Image generation failed. Check Actions logs.',
              results:[], done:0, total:0, timestamp:Date.now()
            }));
          "
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || (git commit -m "err: ${JOB_ID}" && git push)
