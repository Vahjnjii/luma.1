name: Render Images

on:
  issue_comment:
    types: [created]

jobs:
  render:
    if: startsWith(github.event.comment.body, 'LUMA_IMG:')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Git config MUST come before any git operations
      - name: Git config
        run: |
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"

      - name: Parse payload
        id: p
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          node << 'EOF'
          const body = process.env.COMMENT_BODY;
          const json = body.slice(body.indexOf(':') + 1);
          let d;
          try { d = JSON.parse(json); } catch(e) { console.error('Bad JSON:', e.message); process.exit(1); }
          const fs = require('fs');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `jobId=${d.jobId||''}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deviceId=${d.deviceId||''}\n`);
          fs.writeFileSync('/tmp/input_text.txt', d.text || '');
          console.log('Parsed jobId:', d.jobId, '| text chars:', (d.text||'').length);
          EOF

      # Write processing status then push — pull+rebase handles parallel conflicts
      - name: Write processing status
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          DEVICE="${{ steps.p.outputs.deviceId }}"
          mkdir -p api/status
          node -e "
            const fs=require('fs');
            fs.writeFileSync('api/status/${JOB_ID}.json', JSON.stringify({
              jobId:'${JOB_ID}', deviceId:'${DEVICE}',
              status:'processing', template:'imggen',
              total:0, done:0, label:'Processing\u2026',
              timestamp:Date.now(), results:[]
            }));
          "
          for i in $(seq 1 8); do
            git add api/status/${JOB_ID}.json
            git diff --staged --quiet && echo "Nothing to commit" && break
            git commit -m "start: ${JOB_ID}" || true
            git pull --rebase origin main && git push && echo "Push ok" && break
            echo "Retry $i..." && sleep $((i * 3))
            git rebase --abort 2>/dev/null || true
          done

      - name: Write generator script
        run: |
          cat > /tmp/gen.mjs << 'JSEOF'
          import fs from 'fs';

          const jobId    = process.env.JOB_ID;
          const text     = fs.readFileSync('/tmp/input_text.txt', 'utf8').trim();
          const deviceId = process.env.DEVICE_ID;
          const worker   = process.env.WORKER_URL;

          if (!jobId || !text) { console.error('Missing jobId or text'); process.exit(1); }
          if (!worker)         { console.error('Missing WORKER_URL secret'); process.exit(1); }

          let posts = [];
          try {
            const res  = await fetch(worker + '/ai', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Worker error ' + res.status);
            posts = data.posts || [];
            console.log('Worker returned ' + posts.length + ' post(s)');
          } catch(e) {
            console.error('Worker error:', e.message);
            process.exit(1);
          }
          if (!posts.length) { console.error('No posts from Worker'); process.exit(1); }

          const cleanText = t => (t||'').replace(/\*\*/g,'').trim();

          function stripPostNumber(title) {
            return (title||'')
              .replace(/^\s*(?:post\s*)?\d+\s*[.:)\-]\s*/i, '')
              .replace(/^\s*\(\d+\)\s*/,                     '')
              .replace(/^\s*第\s*[\d一二三四五六七八九十百]+\s*[：:条篇部张节]\s*/u, '')
              .replace(/^\s*[一二三四五六七八九十][、。：\s]/u, '')
              .replace(/^\s*#+\s*/,                          '')
              .trim();
          }

          function decodeEntities(str) {
            if (!str) return str;
            return str
              .replace(/&#(\d+);/g,           (_, n) => { try { return String.fromCodePoint(parseInt(n,10)); } catch { return ''; } })
              .replace(/&#x([0-9a-fA-F]+);/gi, (_, h) => { try { return String.fromCodePoint(parseInt(h,16)); } catch { return ''; } });
          }

          posts = posts.map(p => ({
            title:   decodeEntities(stripPostNumber(p.title   || '')),
            content: (p.content || []).map(l => decodeEntities(l || '')),
          }));

          // ── ZODIAC SIGNS — all major languages ──
          // Words are matched only as WHOLE standalone tokens (surrounded by
          // word-boundary or whitespace/punctuation) to avoid false positives
          // e.g. "Cancer research" → only bold if it IS the zodiac context
          // Detection strategy: match only when the word IS the entire line-segment
          // or appears at line start / after a separator like : • –
          const ZODIAC_MAP = {
            // English
            Aries:1,Taurus:1,Gemini:1,Cancer:1,Leo:1,Virgo:1,Libra:1,
            Scorpio:1,Sagittarius:1,Capricorn:1,Aquarius:1,Pisces:1,
            // German
            Widder:1,Stier:1,Zwillinge:1,Krebs:1,Löwe:1,Jungfrau:1,
            Waage:1,Skorpion:1,Schütze:1,Steinbock:1,Wassermann:1,Fische:1,
            // French
            Bélier:1,Taureau:1,Gémeaux:1,Vierge:1,Balance:1,Scorpion:1,
            Sagittaire:1,Capricorne:1,Verseau:1,Poissons:1,
            // Spanish
            Aries:1,Tauro:1,Géminis:1,Cáncer:1,Léo:1,Virgo:1,Libra:1,
            Escorpio:1,Escorpión:1,Sagitario:1,Capricornio:1,Acuario:1,Piscis:1,
            // Italian
            Ariete:1,Toro:1,Gemelli:1,Cancro:1,Leone:1,Vergine:1,Bilancia:1,
            Scorpione:1,Sagittario:1,Capricorno:1,Acquario:1,Pesci:1,
            // Portuguese
            Carneiro:1,Touro:1,Gêmeos:1,Gémeos:1,Caranguejo:1,Leão:1,
            Virgem:1,Balança:1,Escorpião:1,Sagitário:1,Capricórnio:1,
            Aquário:1,Peixes:1,
            // Dutch
            Ram:1,Stier:1,Tweelingen:1,Kreeft:1,Leeuw:1,Maagd:1,Weegschaal:1,
            Schorpioen:1,Boogschutter:1,Steenbok:1,Waterman:1,Vissen:1,
            // Polish
            Baran:1,Byk:1,Bliźnięta:1,Rak:1,Lew:1,Panna:1,Waga:1,
            Skorpion:1,Strzelec:1,Koziorożec:1,Wodnik:1,Ryby:1,
            // Swedish / Norwegian / Danish
            Väduren:1,Oxen:1,Tvillingarna:1,Kräftan:1,Lejonet:1,Jungfrun:1,
            Vågen:1,Skorpionen:1,Skytten:1,Stenbocken:1,Vattumannen:1,Fiskarna:1,
            Væren:1,Tyren:1,Tvillingene:1,Krebsen:1,Løven:1,Jomfruen:1,
            Vægten:1,Skorpionen:1,Skytten:1,Stenbukken:1,Vandmanden:1,Fiskene:1,
            // Russian
            Овен:1,Телец:1,Близнецы:1,Рак:1,Лев:1,Дева:1,Весы:1,
            Скорпион:1,Стрелец:1,Козерог:1,Водолей:1,Рыбы:1,
            // Turkish
            Koç:1,Boğa:1,İkizler:1,Yengeç:1,Aslan:1,Başak:1,Terazi:1,
            Akrep:1,Yay:1,Oğlak:1,Kova:1,Balık:1,
            // Indonesian / Malay
            Domba:1,Sapi:1,Kembar:1,Ketam:1,Singa:1,Perawan:1,Timbangan:1,
            Kalajengking:1,Pemanah:1,Kambing:1,Kendi:1,Ikan:1,
            // Hindi / Marathi
            'मेष':1,'वृषभ':1,'मिथुन':1,'कर्क':1,'कर्कट':1,'सिंह':1,'कन्या':1,
            'तुला':1,'वृश्चिक':1,'धनु':1,'मकर':1,'कुंभ':1,'मीन':1,
            // Tamil
            'மேஷம்':1,'ரிஷபம்':1,'மிதுனம்':1,'கடகம்':1,'சிம்மம்':1,'கன்னி':1,
            'துலாம்':1,'விருச்சிகம்':1,'தனுசு':1,'மகரம்':1,'கும்பம்':1,'மீனம்':1,
            // Malayalam
            'മേഷം':1,'ഇടവം':1,'മിഥുനം':1,'കർക്കടകം':1,'ചിങ്ങം':1,'കന്നി':1,
            'തുലാം':1,'വൃശ്ചികം':1,'ധനു':1,'മകരം':1,'കുംഭം':1,'മീനം':1,
            // Telugu
            'మేషం':1,'వృషభం':1,'మిథునం':1,'కర్కాటకం':1,'సింహం':1,'కన్య':1,
            'తుల':1,'వృశ్చికం':1,'ధనుస్సు':1,'మకరం':1,'కుంభం':1,'మీనం':1,
            // Kannada
            'ಮೇಷ':1,'ವೃಷಭ':1,'ಮಿಥುನ':1,'ಕರ್ಕಾಟಕ':1,'ಸಿಂಹ':1,'ಕನ್ಯಾ':1,
            'ತುಲಾ':1,'ವೃಶ್ಚಿಕ':1,'ಧನು':1,'ಮಕರ':1,'ಕುಂಭ':1,'ಮೀನ':1,
            // Bengali
            'মেষ':1,'বৃষভ':1,'মিথুন':1,'কর্কট':1,'সিংহ':1,'কন্যা':1,
            'তুলা':1,'বৃশ্চিক':1,'ধনু':1,'মকর':1,'কুম্ভ':1,'মীন':1,
            // Chinese
            '白羊座':1,'金牛座':1,'双子座':1,'巨蟹座':1,'狮子座':1,'处女座':1,
            '天秤座':1,'天蝎座':1,'射手座':1,'摩羯座':1,'水瓶座':1,'双鱼座':1,
            '牡羊座':1,'雙子座':1,'獅子座':1,'處女座':1,'天蠍座':1,'雙魚座':1,
            // Japanese
            '牡牛座':1,'蟹座':1,'乙女座':1,'蠍座':1,'山羊座':1,'魚座':1,
            // Arabic
            'الحمل':1,'الثور':1,'الجوزاء':1,'السرطان':1,'الأسد':1,'العذراء':1,
            'الميزان':1,'العقرب':1,'القوس':1,'الجدي':1,'الدلو':1,'الحوت':1,
          };
          const ZODIAC_SET = new Set(Object.keys(ZODIAC_MAP));

          const PLANET_WORDS = [
            'Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Rahu','Ketu','Uranus','Neptune','Pluto',
            // Hindi planets
            'सूर्य','चंद्र','मंगल','बुध','गुरु','शुक्र','शनि','राहु','केतु',
            // Chinese planets
            '太阳','月亮','火星','水星','木星','金星','土星',
            // German planets
            'Sonne','Mond','Merkur',
            // Arabic planets
            'الشمس','القمر','المريخ','عطارد','المشتري','الزهرة','زحل',
            // French planets
            'Soleil','Lune','Mercure','Jupiter','Vénus','Saturne','Mars',
            // Spanish planets
            'Sol','Luna','Marte','Mercurio','Júpiter','Venus','Saturno',
            // Italian planets
            'Sole','Luna','Marte','Mercurio','Giove','Venere','Saturno',
            // Polish planets
            'Słońce','Księżyc','Mars','Merkury','Jowisz','Wenus','Saturn',
            // Russian planets
            'Солнце','Луна','Марс','Меркурий','Юпитер','Венера','Сатурн',
          ];

          const TIMING_RE = /(?<!\*\*)\b(Today|Tomorrow|Lucky|Unlucky|Auspicious|Inauspicious|Important|Warning|Alert|Special|Excellent|Favorable|Unfavorable|Good|Bad|Critical|Best|Worst)\b(?!\*\*)/gi;

          // ── Smart bold: only bold zodiac/planet words when they appear as
          //    standalone tokens — at line start, after punctuation/colon/dash,
          //    or as the only word-like token on a segment. This prevents
          //    "cancer research" or "leo messi" from being bolded. ──
          function boldZodiacSmart(t) {
            if (!t) return t;
            // Split on word boundaries preserving separators
            // Bold a zodiac/planet word only if preceded by: start, whitespace, colon, dash, bullet, newline
            const zodiacArr = [...ZODIAC_SET, ...PLANET_WORDS]
              .sort((a,b) => b.length - a.length)
              .map(w => w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
            // Match word only when it is the whole "slot" — preceded by line-start
            // or separator character, followed by separator or end
            const re = new RegExp(
              '(^|[\\s:•–—\\-,（(\\[])(' + zodiacArr.join('|') + ')(?=[\\s:•–—\\-,）)\\].,!?]|$)',
              'gmu'
            );
            return t.replace(re, (m, pre, word) => {
              // Already bolded
              if (t.slice(t.indexOf(word)-2, t.indexOf(word)) === '**') return m;
              return pre + '**' + word + '**';
            });
          }

          function applyBold(t) {
            if (!t) return t;
            t = boldZodiacSmart(t);
            // Numbers with units (currency, percent, ordinals)
            t = t.replace(/(?<!\*)\b(\d+(?:\.\d+)?\s*[%₹$€£]|[₹$€£]\s*\d+(?:\.\d+)?|\d+(?:st|nd|rd|th))\b(?!\*)/g, '**$1**');
            t = t.replace(TIMING_RE, '**$1**');
            t = t.replace(/\*{4}/g,'**').replace(/\*\*(\s+)\*\*/g,'$1');
            return t;
          }

          posts = posts.map(p => ({
            title:   p.title,  // title: plain text, no bold, no emoji
            content: p.content.map(l => l ? applyBold(l) : l),
          }));

          // ── Detect if content is astro/list style or paragraph style ──
          // Paragraph style = long lines (avg > 60 chars), few short lines
          // List/astro style = many short lines, or lines starting with emojis/bullets
          const HAS_EMOJI_ANYWHERE = /\p{Emoji_Presentation}|\p{Emoji}\uFE0F/u;

          function isAstroContent(allPosts) {
            // Check title or content for zodiac/astro keywords across all posts
            const allText = allPosts.map(p =>
              (p.title||'') + ' ' + (p.content||[]).join(' ')
            ).join(' ').toLowerCase();
            // Zodiac keywords in any language
            const hasZodiac = [...ZODIAC_SET].some(w => allText.includes(w.toLowerCase()));
            const hasAstroKw = /zodiac|horoscope|rashifal|rashi|astro|kundali|nakshatra|lagna|graha|horoskop|horóscopo|horoscope|гороскоп|burç|ramalan/i.test(allText);
            return hasZodiac || hasAstroKw;
          }

          function isParagraphStyle(contentLines) {
            const nonEmpty = contentLines.filter(l => l && cleanText(l).length > 0);
            if (!nonEmpty.length) return false;
            const avgLen = nonEmpty.reduce((s,l) => s + cleanText(l).length, 0) / nonEmpty.length;
            // If average line is long (>55 chars) and there are few lines → paragraph
            return avgLen > 55 && nonEmpty.length <= 6;
          }

          const isAstro = isAstroContent(posts);

          function topicEmoji(t) {
            const s = (t||'').toLowerCase();
            if (/aries|taurus|gemini|cancer|leo|virgo|libra|scorpio|sagittarius|capricorn|aquarius|pisces|zodiac|rashi|horoscope|rashifal|horoskop|burç/i.test(s)) return '🔮';
            if (/lucky|luck|fortune|auspicious|geluk|fortuna|glück|chance/i.test(s)) return '🍀';
            if (/warning|caution|alert|danger|waarschuwing|avertissement/i.test(s)) return '⚠️';
            if (/love|heart|romance|relationship|liebe|amour|amor|amore/i.test(s)) return '❤️';
            if (/money|wealth|finance|earn|profit|geld|argent|dinero|soldi/i.test(s)) return '💰';
            if (/health|fitness|body|gesundheit|santé|salud|salute/i.test(s)) return '💪';
            if (/career|job|work|business|karriere|carrière|carrera/i.test(s)) return '💼';
            if (/study|learn|education|knowledge|studie|éducation/i.test(s)) return '📚';
            if (/travel|journey|trip|reise|voyage|viaje|viaggio/i.test(s)) return '✈️';
            if (/family|home|house|familie|famille|familia|famiglia/i.test(s)) return '🏠';
            if (/sun|solar|sonne|soleil|sol|sole/i.test(s)) return '☀️';
            if (/moon|lunar|mond|lune|luna/i.test(s)) return '🌙';
            if (/fire|energy|passion|feuer|feu|fuego/i.test(s)) return '🔥';
            if (/win|success|victory|erfolg|succès|éxito/i.test(s)) return '🏆';
            return '✨';
          }

          function processContentLine(line, isAstro, isPara) {
            if (!line || !line.trim()) return line;
            const plain = cleanText(line);
            const hasEmoji = HAS_EMOJI_ANYWHERE.test(plain);

            // If line already has emoji — keep as-is (emoji acts as bullet)
            if (hasEmoji) return line;

            // Paragraph mode: no emoji added, render as plain text
            if (isPara) return line;

            // Astro or list mode: add emoji as bullet at start
            if (isAstro) return topicEmoji(plain) + ' ' + line.trimStart();

            // Non-astro list: only add emoji if line is short (looks like a list item)
            // Long lines (>80 chars) are treated as paragraph sentences — no bullet
            if (plain.length <= 80) return topicEmoji(plain) + ' ' + line.trimStart();

            // Long line in non-astro content → no emoji
            return line;
          }

          posts = posts.map(p => {
            const isPara = isParagraphStyle(p.content || []);
            return {
              title:   p.title,
              content: (p.content || []).map(l => processContentLine(l, isAstro, isPara)),
            };
          });

          const EMOJI_FONT = `'Apple Color Emoji','Noto Color Emoji','Segoe UI Emoji','Segoe UI Symbol'`;
          const BASE_FONT  = `'Syne','DM Sans',ui-sans-serif,system-ui,sans-serif,${EMOJI_FONT}`;

          function xe(s) {
            return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
          }
          function parseBold(text) {
            const segs = [], re = /\*\*(.*?)\*\*/g;
            let last = 0, m;
            while ((m = re.exec(text)) !== null) {
              if (m.index > last) segs.push({ t: text.slice(last, m.index), bold: false });
              if (m[1])           segs.push({ t: m[1], bold: true });
              last = re.lastIndex;
            }
            if (last < text.length) segs.push({ t: text.slice(last), bold: false });
            return segs.filter(s => s.t);
          }

          // ── renderLine: plain line ──
          function renderLine(px, y, fs, fw, fill, rawText) {
            const segs = parseBold(rawText);
            const hasBold = segs.some(s => s.bold);
            if (!hasBold)
              return `<text x="${px}" y="${y}" font-family="${BASE_FONT}" font-size="${fs}" font-weight="${fw}" fill="${fill}" xml:space="preserve">${xe(cleanText(rawText))}</text>`;
            const spans = segs.map(s =>
              `<tspan font-weight="${s.bold?900:fw}" fill="${s.bold?'#FFFFFF':fill}">${xe(s.t)}</tspan>`
            ).join('');
            return `<text x="${px}" y="${y}" font-family="${BASE_FONT}" font-size="${fs}" font-weight="${fw}" fill="${fill}" xml:space="preserve">${spans}</text>`;
          }

          // ── renderBulletLine: emoji bullet + indented wrapped text ──
          // The first emoji acts as a bullet point. Continuation lines indent to align after it.
          function renderBulletLine(px, y, fs, fw, fill, rawText, blh, bCPL, W, PX) {
            const plain = cleanText(rawText);
            // Detect leading emoji
            const emojiRE = /^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F\u20E3?|\p{Emoji}\uFE0F)/u;
            const em = plain.match(emojiRE);
            if (!em) return [renderLine(px, y, fs, fw, fill, rawText), y + blh];

            const emojiChar = em[0];
            const emojiW    = Math.round(fs * 1.2);   // emoji column width
            const indent    = px + emojiW + Math.round(fs * 0.35); // text starts here
            const textCW    = W - indent - PX;
            const textCPL   = Math.floor(textCW / (fs * 0.50));

            // Strip the leading emoji from the rest of the text
            const rest = rawText.slice(rawText.indexOf(emojiChar) + emojiChar.length).trimStart();

            // Wrap the rest into lines that fit within the indented column
            const wrapped = wrapLatin(rest, textCPL);

            const out = [];
            // Emoji on first line
            out.push(`<text x="${px}" y="${y}" font-family="${BASE_FONT}" font-size="${fs}" font-weight="${fw}" fill="${fill}" xml:space="preserve">${xe(emojiChar)}</text>`);
            // First text line beside the emoji
            if (wrapped[0]) out.push(renderLine(indent, y, fs, fw, fill, wrapped[0]));
            // Continuation lines indented
            let cy = y + blh;
            for (let i = 1; i < wrapped.length; i++) {
              out.push(renderLine(indent, cy, fs, fw, fill, wrapped[i]));
              cy += blh;
            }
            return [out.join('\n'), cy];
          }

          function isWide(ch) {
            const cp = ch.codePointAt(0);
            return (cp>=0x1F000||(cp>=0x2600&&cp<=0x27FF)||(cp>=0x4E00&&cp<=0x9FFF)||
              (cp>=0x3400&&cp<=0x4DBF)||(cp>=0x20000&&cp<=0x2FA1F)||
              (cp>=0x3040&&cp<=0x30FF)||(cp>=0xAC00&&cp<=0xD7AF)||
              (cp>=0xFF00&&cp<=0xFFEF)||(cp>=0x3000&&cp<=0x303F)||(cp>=0x3200&&cp<=0x33FF));
          }
          function charVisLen(str) { let n=0; for(const ch of [...(str||'')]) n+=isWide(ch)?2:1; return n; }
          function wrapLatin(text,cpl) {
            const words=text.split(' '),lines=[];let cur='',curLen=0;
            for(const word of words){
              const wLen=charVisLen(cleanText(word)),sep=cur?1:0;
              if(curLen+sep+wLen>cpl&&cur){lines.push(cur);cur=word;curLen=wLen;}
              else{cur=cur?`${cur} ${word}`:word;curLen+=sep+wLen;}
            }
            if(cur)lines.push(cur);return lines.length?lines:[''];
          }
          function wrapCJK(text,cpl) {
            const lines=[];let curRaw='',curLen=0,inBold=false;
            const chars=[...text];let i=0;
            while(i<chars.length){
              if(chars[i]==='*'&&chars[i+1]==='*'){curRaw+='**';inBold=!inBold;i+=2;continue;}
              const ch=chars[i],chLen=isWide(ch)?2:1;
              if(curLen+chLen>cpl&&cleanText(curRaw).length>0){
                if(inBold)curRaw+='**';lines.push(curRaw);
                curRaw=inBold?'**'+ch:ch;curLen=chLen;
              }else{curRaw+=ch;curLen+=chLen;}
              i++;
            }
            if(cleanText(curRaw))lines.push(curRaw);return lines.length?lines:[''];
          }
          function smartWrap(text,cpl) {
            if(!text)return[''];
            const plain=cleanText(text);
            const wideCount=[...plain].filter(isWide).length;
            const spaceCount=(plain.match(/ /g)||[]).length;
            return(wideCount>plain.length*0.3||(wideCount>2&&spaceCount<2))?wrapCJK(text,cpl):wrapLatin(text,cpl);
          }

          async function makeSVG(post, imgIndex) {
            const W=1080,H=1920,PX=110,PY=130,CW=W-PX*2,BOTTOM=H-PY;
            const rawTitle=(post.title||'').trim(),content=(post.content||[]);
            const visLen=charVisLen(cleanText(rawTitle))+charVisLen(content.map(l=>cleanText(l||'')).join(''));

            let ts,bs,tlh,blh,gap;
            if(visLen<80){ts=96;bs=62;tlh=134;blh=96;gap=76;}
            else if(visLen<150){ts=86;bs=55;tlh=120;blh=86;gap=68;}
            else if(visLen<260){ts=74;bs=49;tlh=104;blh=76;gap=58;}
            else if(visLen<420){ts=65;bs=44;tlh=92;blh=68;gap=50;}
            else if(visLen<620){ts=55;bs=40;tlh=80;blh=62;gap=44;}
            else if(visLen<900){ts=48;bs=35;tlh=70;blh=54;gap=36;}
            else{ts=41;bs=31;tlh=60;blh=48;gap=32;}

            // line height = font size * 1.55 for a little extra breathing room (not a full line gap)
            blh = Math.round(bs * 1.55);
            tlh = Math.round(ts * 1.40);

            const tCPL=Math.floor(CW/(ts*0.50)),bCPL=Math.floor(CW/(bs*0.50));
            const titleLines=smartWrap(rawTitle,tCPL);

            const totalH_estimate = titleLines.length*tlh + gap + content.filter(l=>cleanText(l||'')).length * blh * 1.3;
            let y = totalH_estimate>(H-PY*2) ? PY+ts : Math.max(PY+ts, Math.round((H-totalH_estimate)/2)+ts);

            const els=[];

            // ── Title — plain text, no emoji, bold white ──
            for(const line of titleLines){
              if(y>BOTTOM+ts)break;
              els.push(renderLine(PX,y,ts,800,'#FFFFFF',line));
              y+=tlh;
            }

            // ── Divider bar after title ──
            if(content.filter(l=>cleanText(l||'')).length){
              const ay=y+Math.round(gap*0.28);
              if(ay<BOTTOM) els.push(`<rect x="${PX}" y="${ay}" width="44" height="4" rx="2" fill="rgba(139,92,246,0.75)"/>`);
              y+=gap;
            }

            // ── Body lines — emoji bullet layout ──
            for(const line of content){
              if(!cleanText(line||'')){
                // Empty line = small half-gap spacer
                y += Math.round(blh * 0.35);
                continue;
              }
              if(y>BOTTOM+bs)break;
              const [svgEl, newY] = renderBulletLine(PX, y, bs, 400, 'rgba(255,255,255,0.88)', line, blh, bCPL, W, PX);
              els.push(svgEl);
              y = newY;
            }

            return[
              '<?xml version="1.0" encoding="UTF-8"?>',
              `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`,
              '<defs>',
              // Pure black background
              '</defs>',
              `<rect width="${W}" height="${H}" fill="#000000"/>`,
              '<g>',
              ...els,
              '</g>','</svg>',
            ].join('\n');
          }

          const dir='api/status';
          fs.mkdirSync(dir,{recursive:true});
          const results=[];
          for(let i=0;i<posts.length;i++){
            const svg=await makeSVG(posts[i], i+1);
            results.push({title:cleanText(posts[i].title),svg});
            const isLast=i===posts.length-1;
            fs.writeFileSync(`${dir}/${jobId}.json`,JSON.stringify({
              jobId,deviceId,
              status:isLast?'done':'processing',
              template:'imggen',
              total:posts.length,
              done:i+1,
              label:cleanText(posts[0]?.title||'Session').slice(0,80),
              timestamp:Date.now(),
              results:results.map(r=>({title:r.title,svg:r.svg})),
            }));
            console.log(`Image ${i+1}/${posts.length} written`);
          }
          console.log('Done: '+results.length+' image(s)');
          JSEOF

      - name: Run generator
        env:
          JOB_ID:     ${{ steps.p.outputs.jobId }}
          DEVICE_ID:  ${{ steps.p.outputs.deviceId }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: node /tmp/gen.mjs

      # Each job only touches its own file — pull+rebase merges cleanly every time
      - name: Commit and push result
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          for i in $(seq 1 8); do
            git add api/status/${JOB_ID}.json
            git diff --staged --quiet && echo "Nothing to commit" && break
            git commit -m "job: ${JOB_ID}" || true
            git pull --rebase origin main && git push && echo "Push ok" && break
            echo "Retry $i..." && sleep $((i * 3))
            git rebase --abort 2>/dev/null || true
          done

      # On any failure — write error file and push it
      - name: Write error on failure
        if: failure()
        env:
          JOB_ID: ${{ steps.p.outputs.jobId }}
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          mkdir -p api/status
          node -e "
            const fs=require('fs'),j='${JOB_ID}';
            fs.writeFileSync('api/status/'+j+'.json',JSON.stringify({
              status:'error',jobId:j,
              error:'Generation failed — check Actions logs.',
              results:[],done:0,total:0,timestamp:Date.now()
            }));
            console.log('Error status written for',j);
          "
          for i in $(seq 1 8); do
            git add api/status/${JOB_ID}.json
            git diff --staged --quiet && break
            git commit -m "err: ${JOB_ID}" || true
            git pull --rebase origin main && git push && echo "Error push ok" && break
            echo "Error retry $i..." && sleep $((i * 3))
            git rebase --abort 2>/dev/null || true
          done
