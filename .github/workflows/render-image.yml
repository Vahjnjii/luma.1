name: Render Video

on:
  issue_comment:
    types: [created]

jobs:
  render:
    if: startsWith(github.event.comment.body, 'LUMA_VID:')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      # Setup Node explicitly — video workflow was missing this
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Git config MUST come before any git operations
      - name: Git config
        run: |
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg -qq

      - name: Parse payload
        id: p
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          node << 'EOF'
          const body = process.env.COMMENT_BODY;
          const json = body.slice(body.indexOf(':') + 1);
          let d;
          try { d = JSON.parse(json); } catch(e) { console.error('Bad JSON:', e.message); process.exit(1); }
          const fs = require('fs');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `jobId=${d.jobId||''}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deviceId=${d.deviceId||''}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `duration=${d.duration||30}\n`);
          fs.writeFileSync('/tmp/overlay_text.txt', d.overlayText || '');
          console.log('Parsed jobId:', d.jobId, '| duration:', d.duration);
          EOF

      # Write processing status with retry push
      - name: Write processing status
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          DEVICE="${{ steps.p.outputs.deviceId }}"
          mkdir -p api/status
          printf '{"jobId":"%s","deviceId":"%s","status":"processing","template":"vidgen","total":0,"done":0,"label":"Rendering videos\u2026","timestamp":%s,"results":[]}' \
            "$JOB_ID" "$DEVICE" "$(date +%s)000" > "api/status/${JOB_ID}.json"
          for i in $(seq 1 8); do
            git add api/status/${JOB_ID}.json
            git diff --staged --quiet && echo "Nothing to commit" && break
            git commit -m "start: video ${JOB_ID}" || true
            git pull --rebase origin main && git push && echo "Push ok" && break
            echo "Retry $i..." && sleep $((i * 3))
            git rebase --abort 2>/dev/null || true
          done

      - name: Generate video from text (SVG frames → MP4)
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          DURATION:   ${{ steps.p.outputs.duration }}
        run: |
          DURATION="${{ steps.p.outputs.duration }}"
          JOB_ID="${{ steps.p.outputs.jobId }}"
          DEVICE_ID="${{ steps.p.outputs.deviceId }}"

          # Use the same AI worker + SVG generator as image mode, then encode to video
          node --input-type=module << 'JSEOF'
          import fs from 'fs';
          import { execSync } from 'child_process';

          const text     = fs.readFileSync('/tmp/overlay_text.txt', 'utf8').trim();
          const worker   = process.env.WORKER_URL;
          const duration = parseInt(process.env.DURATION || '10', 10);

          if (!worker) { console.error('Missing WORKER_URL'); process.exit(1); }

          // Get posts from AI worker
          let posts = [];
          try {
            const res  = await fetch(worker + '/ai', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Worker error ' + res.status);
            posts = data.posts || [];
            console.log('Worker returned ' + posts.length + ' post(s)');
          } catch(e) {
            // Fallback: treat entire text as one post
            posts = [{ title: text.split('\n')[0] || 'Video', content: text.split('\n').slice(1) }];
          }
          if (!posts.length) posts = [{ title: text.split('\n')[0] || 'Video', content: [] }];

          const cleanText = t => (t||'').replace(/\*\*/g,'').trim();

          const EMOJI_FONT = `'Noto Color Emoji','Segoe UI Emoji','Apple Color Emoji'`;
          const BASE_FONT  = `'Noto Sans','DejaVu Sans',sans-serif,${EMOJI_FONT}`;

          function xe(s) {
            return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
          }
          function isWide(ch) {
            const cp = ch.codePointAt(0);
            return (cp>=0x1F000||(cp>=0x2600&&cp<=0x27FF)||(cp>=0x4E00&&cp<=0x9FFF)||
              (cp>=0x3040&&cp<=0x30FF)||(cp>=0xAC00&&cp<=0xD7AF));
          }
          function charVisLen(str) { let n=0; for(const ch of [...(str||'')]) n+=isWide(ch)?2:1; return n; }
          function wrapText(text, cpl) {
            const words=text.split(' '), lines=[];let cur='',curLen=0;
            for(const word of words){
              const wLen=charVisLen(cleanText(word)),sep=cur?1:0;
              if(curLen+sep+wLen>cpl&&cur){lines.push(cur);cur=word;curLen=wLen;}
              else{cur=cur?`${cur} ${word}`:word;curLen+=sep+wLen;}
            }
            if(cur)lines.push(cur);return lines.length?lines:[''];
          }

          function makeSVG(post) {
            const W=1080,H=1920,PX=110,PY=130,CW=W-PX*2,BOTTOM=H-PY;
            const rawTitle=(post.title||'').trim(), content=(post.content||[]).filter(l=>l&&l.trim());
            const visLen=charVisLen(cleanText(rawTitle))+charVisLen(content.map(l=>cleanText(l||'')).join(''));

            let ts,bs,tlh,blh,gap;
            if(visLen<80){ts=96;bs=62;tlh=Math.round(96*1.40);blh=Math.round(62*1.55);gap=76;}
            else if(visLen<150){ts=86;bs=55;tlh=Math.round(86*1.40);blh=Math.round(55*1.55);gap=68;}
            else if(visLen<260){ts=74;bs=49;tlh=Math.round(74*1.40);blh=Math.round(49*1.55);gap=58;}
            else if(visLen<420){ts=65;bs=44;tlh=Math.round(65*1.40);blh=Math.round(44*1.55);gap=50;}
            else if(visLen<620){ts=55;bs=40;tlh=Math.round(55*1.40);blh=Math.round(40*1.55);gap=44;}
            else{ts=48;bs=35;tlh=Math.round(48*1.40);blh=Math.round(35*1.55);gap=36;}

            const tCPL=Math.floor(CW/(ts*0.50)), bCPL=Math.floor(CW/(bs*0.50));
            const titleLines = wrapText(rawTitle, tCPL);

            const els=[];
            const totalH = titleLines.length*tlh + gap + content.length*blh*1.2;
            let y = totalH>(H-PY*2) ? PY+ts : Math.max(PY+ts, Math.round((H-totalH)/2)+ts);

            // Title
            for(const line of titleLines){
              if(y>BOTTOM+ts)break;
              els.push(`<text x="${PX}" y="${y}" font-family="${BASE_FONT}" font-size="${ts}" font-weight="800" fill="#FFFFFF" xml:space="preserve">${xe(cleanText(line))}</text>`);
              y+=tlh;
            }

            // Divider
            if(content.length){
              const ay=y+Math.round(gap*0.28);
              if(ay<BOTTOM) els.push(`<rect x="${PX}" y="${ay}" width="44" height="4" rx="2" fill="rgba(139,92,246,0.75)"/>`);
              y+=gap;
            }

            // Body lines with emoji bullet layout
            const HAS_EMOJI = /\p{Emoji_Presentation}|\p{Emoji}\uFE0F/u;
            const emojiRE   = /^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F\u20E3?|\p{Emoji}\uFE0F)/u;
            for(const line of content){
              if(y>BOTTOM+bs)break;
              const plain = cleanText(line);
              const em = plain.match(emojiRE);
              if(em){
                const emojiChar = em[0];
                const emojiW    = Math.round(bs*1.2);
                const indent    = PX + emojiW + Math.round(bs*0.35);
                const textCPL   = Math.floor((W-indent-PX)/(bs*0.50));
                const rest      = line.slice(line.indexOf(emojiChar)+emojiChar.length).trimStart();
                const wrapped   = wrapText(cleanText(rest), textCPL);
                els.push(`<text x="${PX}" y="${y}" font-family="${BASE_FONT}" font-size="${bs}" font-weight="400" fill="rgba(255,255,255,0.88)" xml:space="preserve">${xe(emojiChar)}</text>`);
                if(wrapped[0]) els.push(`<text x="${indent}" y="${y}" font-family="${BASE_FONT}" font-size="${bs}" font-weight="400" fill="rgba(255,255,255,0.88)" xml:space="preserve">${xe(wrapped[0])}</text>`);
                let cy=y+blh;
                for(let i=1;i<wrapped.length;i++){
                  els.push(`<text x="${indent}" y="${cy}" font-family="${BASE_FONT}" font-size="${bs}" font-weight="400" fill="rgba(255,255,255,0.88)" xml:space="preserve">${xe(wrapped[i])}</text>`);
                  cy+=blh;
                }
                y=cy;
              } else {
                const wrapped = wrapText(plain, bCPL);
                for(const w of wrapped){
                  if(y>BOTTOM+bs)break;
                  els.push(`<text x="${PX}" y="${y}" font-family="${BASE_FONT}" font-size="${bs}" font-weight="400" fill="rgba(255,255,255,0.88)" xml:space="preserve">${xe(w)}</text>`);
                  y+=blh;
                }
              }
            }

            return [
              '<?xml version="1.0" encoding="UTF-8"?>',
              `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`,
              `<rect width="${W}" height="${H}" fill="#000000"/>`,
              '<g>', ...els, '</g>', '</svg>'
            ].join('\n');
          }

          // Generate one MP4 per post — each exactly `duration` seconds
          const frameDir = '/tmp/frames';
          fs.mkdirSync(frameDir, { recursive: true });

          const videoFiles = [];
          for(let i=0; i<posts.length; i++){
            const svg     = makeSVG(posts[i]);
            const svgPath = `${frameDir}/post_${i}.svg`;
            const pngPath = `${frameDir}/post_${i}.png`;
            const mp4Path = `${frameDir}/post_${i}.mp4`;
            fs.writeFileSync(svgPath, svg);
            // SVG → PNG
            execSync(`ffmpeg -y -i "${svgPath}" "${pngPath}" 2>/dev/null`, {stdio:'pipe'});
            // PNG → MP4 (exactly duration seconds, still image looped)
            execSync([
              'ffmpeg -y',
              `-loop 1 -i "${pngPath}"`,
              `-t ${duration}`,
              '-vf scale=1080:1920:flags=lanczos',
              '-c:v libx264 -preset fast -crf 22',
              '-pix_fmt yuv420p',
              '-movflags +faststart',
              `"${mp4Path}"`
            ].join(' '), {stdio:'pipe'});
            videoFiles.push(mp4Path);
            console.log(`Video ${i+1}/${posts.length} encoded`);
          }

          // Write list of generated files for the upload step
          fs.writeFileSync('/tmp/video_files.json', JSON.stringify(
            posts.map((p,i) => ({
              title: (p.title||'').replace(/\*\*/g,'').trim(),
              file:  videoFiles[i],
            }))
          ));
          console.log(`All ${videoFiles.length} videos encoded`);
          JSEOF

          echo "VIDEO_READY=true" >> $GITHUB_ENV

      - name: Upload videos to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          TAG:      video-${{ steps.p.outputs.jobId }}
          REPO:     ${{ github.repository }}
          JOB_ID:   ${{ steps.p.outputs.jobId }}
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          REPO="${{ github.repository }}"
          TAG="video-${JOB_ID}"
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "Video $JOB_ID" \
            --notes "Auto-generated by LUMA" \
            --latest=false 2>/dev/null || true
          # Upload each video file
          node --input-type=module << 'UPLOADEOF'
          import { execSync } from 'child_process';
          import fs from 'fs';
          const tag   = process.env.TAG;
          const repo  = process.env.REPO;
          const jobId = process.env.JOB_ID;
          const items = JSON.parse(fs.readFileSync('/tmp/video_files.json','utf8'));
          const urls  = [];
          for(let i=0; i<items.length; i++){
            const fname = `${tag}-${i+1}.mp4`;
            execSync(`gh release upload "${tag}" "${items[i].file}#${fname}" --repo "${repo}" --clobber`);
            urls.push({
              title:    items[i].title,
              videoUrl: `https://github.com/${repo}/releases/download/${tag}/${fname}`,
            });
            console.log(`Uploaded ${fname}`);
          }
          fs.writeFileSync('/tmp/video_urls.json', JSON.stringify(urls));
          UPLOADEOF

      - name: Write status JSON
        env:
          JOB_ID:    ${{ steps.p.outputs.jobId }}
          DEVICE_ID: ${{ steps.p.outputs.deviceId }}
        run: |
          LABEL=$(head -c 80 /tmp/overlay_text.txt)
          node --input-type=module << 'STATUSEOF'
          import fs from 'fs';
          const jid     = process.env.JOB_ID;
          const did     = process.env.DEVICE_ID;
          const lbl     = process.env.LABEL || 'Video';
          const results = JSON.parse(fs.readFileSync('/tmp/video_urls.json','utf8'));
          fs.mkdirSync('api/status', { recursive: true });
          fs.writeFileSync('api/status/' + jid + '.json', JSON.stringify({
            jobId:jid, deviceId:did, status:'done', template:'vidgen',
            total:results.length, done:results.length,
            label:lbl, timestamp:Date.now(),
            results,
          }));
          console.log('Status written:', results.length, 'video(s) for', jid);
          STATUSEOF
          LABEL="$LABEL"

      # Commit status with retry push
      - name: Commit status
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          for i in $(seq 1 8); do
            git add api/status/${JOB_ID}.json
            git diff --staged --quiet && echo "Nothing to commit" && break
            git commit -m "video: ${JOB_ID}" || true
            git pull --rebase origin main && git push && echo "Push ok" && break
            echo "Retry $i..." && sleep $((i * 3))
            git rebase --abort 2>/dev/null || true
          done

      # Always write error if anything failed
      - name: Write error status on failure
        if: failure()
        env:
          JOB_ID: ${{ steps.p.outputs.jobId }}
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          mkdir -p api/status
          node -e "
            const fs=require('fs'),j=process.env.JOB_ID;
            fs.writeFileSync('api/status/'+j+'.json', JSON.stringify({
              status:'error', jobId:j,
              error:'Video render failed. Check Actions logs.',
              results:[], done:0, total:0, timestamp:Date.now()
            }));
          "
          for i in $(seq 1 8); do
            git add api/status/${JOB_ID}.json
            git diff --staged --quiet && break
            git commit -m "err: video ${JOB_ID}" || true
            git pull --rebase origin main && git push && echo "Error push ok" && break
            echo "Error retry $i..." && sleep $((i * 3))
            git rebase --abort 2>/dev/null || true
          done
