// LUMA Worker
// Uses @cf/meta/llama-3.1-8b-instruct-fast with text completion (prompt:)
// Same approach as the reference project — fast, no timeout

export default {
  async fetch(request, env) {
    const cors = {
      'Access-Control-Allow-Origin': '*',
      'Access-Control-Allow-Methods': 'GET, POST, OPTIONS',
      'Access-Control-Allow-Headers': 'Content-Type',
    };

    if (request.method === 'OPTIONS') return new Response(null, { status: 204, headers: cors });

    if (request.method === 'GET')
      return new Response(JSON.stringify({ status: 'LUMA Worker running ✅' }), {
        status: 200, headers: { ...cors, 'Content-Type': 'application/json' },
      });

    if (request.method === 'POST') {
      const url = new URL(request.url);

      // ── Route 1: GitHub proxy ──
      if (url.pathname === '/' || url.pathname === '') {
        try {
          const { owner, repo, issue, body } = await request.json();
          if (!owner || !repo || !issue || !body)
            return new Response(JSON.stringify({ error: 'Missing fields' }), {
              status: 400, headers: { ...cors, 'Content-Type': 'application/json' },
            });
          const ghRes = await fetch(
            `https://api.github.com/repos/${owner}/${repo}/issues/${issue}/comments`,
            {
              method: 'POST',
              headers: {
                'Accept': 'application/vnd.github+json',
                'Authorization': `token ${env.GH_TOKEN}`,
                'Content-Type': 'application/json',
                'X-GitHub-Api-Version': '2022-11-28',
                'User-Agent': 'LUMA-Worker',
              },
              body: JSON.stringify({ body }),
            }
          );
          const data = await ghRes.json();
          return new Response(JSON.stringify(data), {
            status: ghRes.status,
            headers: { ...cors, 'Content-Type': 'application/json' },
          });
        } catch (err) {
          return new Response(JSON.stringify({ error: err.message }), {
            status: 500, headers: { ...cors, 'Content-Type': 'application/json' },
          });
        }
      }

      // ── Route 2: /ai — AI splits text into posts ──
      if (url.pathname === '/ai') {
        try {
          const { text } = await request.json();
          if (!text)
            return new Response(JSON.stringify({ error: 'Missing text' }), {
              status: 400, headers: { ...cors, 'Content-Type': 'application/json' },
            });

          if (!env.AI)
            return new Response(JSON.stringify({ error: 'AI binding missing — add binding named: AI' }), {
              status: 500, headers: { ...cors, 'Content-Type': 'application/json' },
            });

          // ── AI prompt: splitting ONLY — no bold, no emoji ──
          // Exactly like the reference project. Keep it simple so the model succeeds.
          const prompt =
`Return ONLY valid JSON. No explanation. No markdown. No code fences.

Task: Split the input into separate posts and structure as JSON.

RULES:
1. REMOVE any post/section numbering from titles. Examples:
   "1. Aries" → title is "Aries"
   "Post 1: Cancer" → title is "Cancer"
   "第一：白羊座" → title is "白羊座"
   "1)" / "1:" / "(1)" prefix → strip it entirely

2. Copy every word, emoji, symbol, punctuation EXACTLY — no changes.

3. Output format (no other text at all):
{"posts":[{"title":"title here","content":["line1","line2",""]}]}

Rules:
- title = first meaningful line of each post, numbering stripped
- content = all remaining lines as array, empty lines become ""
- Posts are separated by blank lines or numbered/named sections

INPUT:
${text}

JSON:`;

          let aiRaw = '';
          try {
            // Use text completion (prompt:) not chat (messages:) — faster, lower latency
            const r = await env.AI.run('@cf/meta/llama-3.1-8b-instruct-fast', {
              prompt,
              max_tokens: 4096,
              temperature: 0.1,
            });
            if      (typeof r === 'string') aiRaw = r;
            else if (r?.response)           aiRaw = r.response;
            else if (r?.result?.response)   aiRaw = r.result.response;
            else throw new Error('Unexpected AI response shape');
          } catch (e) {
            // AI failed — fall back to JS splitter
            console.error('AI failed, using JS fallback:', e.message);
            const posts = jsSplit(text);
            return new Response(JSON.stringify({ posts }), {
              status: 200, headers: { ...cors, 'Content-Type': 'application/json' },
            });
          }

          // Strip markdown fences if model added them
          aiRaw = aiRaw.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '').trim();

          const si = aiRaw.indexOf('{');
          const ei = aiRaw.lastIndexOf('}');

          if (si === -1 || ei === -1) {
            // No JSON at all — use JS fallback
            const posts = jsSplit(text);
            return new Response(JSON.stringify({ posts }), {
              status: 200, headers: { ...cors, 'Content-Type': 'application/json' },
            });
          }

          let posts = [];
          try {
            const parsed = JSON.parse(repairJSON(aiRaw.slice(si, ei + 1)));
            posts = Array.isArray(parsed) ? parsed : (parsed.posts || []);
          } catch {
            posts = extractFallback(aiRaw);
          }

          // If AI gave garbage, fall back to JS splitter
          if (!posts.length) {
            posts = jsSplit(text);
          }

          // Validate shape
          posts = posts
            .filter(p => p && (p.title || (p.content && p.content.length)))
            .map(p => ({
              title:   String(p.title ?? '').trim(),
              content: Array.isArray(p.content) ? p.content.map(l => String(l ?? '')) : [],
            }));

          if (!posts.length) posts = jsSplit(text);

          return new Response(JSON.stringify({ posts }), {
            status: 200, headers: { ...cors, 'Content-Type': 'application/json' },
          });

        } catch (err) {
          return new Response(JSON.stringify({ error: err.message }), {
            status: 500, headers: { ...cors, 'Content-Type': 'application/json' },
          });
        }
      }
    }

    return new Response(JSON.stringify({ error: 'Not found' }), {
      status: 404, headers: { 'Content-Type': 'application/json' },
    });
  },
};

// ── JS fallback splitter (used if AI fails) ──────────────────────────────────
function jsSplit(text) {
  const lines = text.split('\n');

  // 1. Blank-line separation
  const hasBlankSeps = lines.some(
    (l, i) => l.trim() === '' && i > 0 && lines[i-1].trim() !== ''
  );
  if (hasBlankSeps) return tosPosts(splitBlanks(lines));

  // 2. Numbered headings: "1." "2." "1)" "(1)"
  const numRE = /^\s*\(?\d+[.):\u3001\uff09]\s*\S/;
  const nonEmpty = lines.filter(l => l.trim());
  if (nonEmpty.filter(l => numRE.test(l)).length >= 2)
    return tosPosts(splitRegex(lines, numRE));

  // 3. CJK ordinal headings
  const cjkRE = /^\s*[一二三四五六七八九十][、。：:]\s*\S/u;
  if (nonEmpty.filter(l => cjkRE.test(l)).length >= 2)
    return tosPosts(splitRegex(lines, cjkRE));

  // 4. Single post
  return tosPosts([nonEmpty]);
}

function splitBlanks(lines) {
  const g = []; let c = [];
  for (const l of lines) {
    if (l.trim() === '') { if (c.length) { g.push(c); c = []; } }
    else c.push(l);
  }
  if (c.length) g.push(c);
  return g;
}

function splitRegex(lines, re) {
  const g = []; let c = [];
  for (const l of lines) {
    if (l.trim() === '') continue;
    if (re.test(l) && c.length) { g.push(c); c = [l]; }
    else c.push(l);
  }
  if (c.length) g.push(c);
  return g;
}

function tosPosts(groups) {
  return groups.filter(g => g.length).map(g => ({
    title:   stripNum(g[0] || ''),
    content: g.slice(1).map(l => l.trimEnd()),
  }));
}

function stripNum(t) {
  return (t || '')
    .replace(/^\s*(?:post\s*)?\d+\s*[.:\-]\s*/i, '')
    .replace(/^\s*\(?\d+[.):\-\u3001]\s*/u, '')
    .replace(/^\s*\uff08\d+\uff09\s*/u, '')
    .replace(/^\s*[一二三四五六七八九十][、。：\s]/u, '')
    .replace(/^\s*#+\s*/, '')
    .trim();
}

// ── JSON repair ──────────────────────────────────────────────────────────────
function repairJSON(str) {
  try { JSON.parse(str); return str; } catch {}
  let s = str.replace(/,\s*$/, '');
  let b = 0, br = 0, inS = false, esc = false;
  for (const c of s) {
    if (esc) { esc = false; continue; }
    if (c === '\\' && inS) { esc = true; continue; }
    if (c === '"') { inS = !inS; continue; }
    if (inS) continue;
    if (c === '{') b++; if (c === '}') b--;
    if (c === '[') br++; if (c === ']') br--;
  }
  if (inS) s += '"';
  s = s.replace(/,\s*$/, '');
  while (br-- > 0) s += ']';
  while (b--  > 0) s += '}';
  return s;
}

function extractFallback(raw) {
  const posts = [];
  const re = /"title"\s*:\s*"([^"]+)"[^}]*?"content"\s*:\s*(\[[^\]]+\])/gs;
  let m;
  while ((m = re.exec(raw)) !== null) {
    try { posts.push({ title: m[1], content: JSON.parse(m[2]) }); } catch {}
  }
  return posts;
}
