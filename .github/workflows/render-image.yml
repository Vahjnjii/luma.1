name: Render Images

on:
  issue_comment:
    types: [created]

jobs:
  render:
    if: startsWith(github.event.comment.body, 'LUMA_IMG:')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # в”Җв”Җ Safe parse: env var avoids shell injection from comment body в”Җв”Җ
      - name: Parse payload
        id: p
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          node << 'EOF'
          const body = process.env.COMMENT_BODY;
          const json = body.slice(body.indexOf(':') + 1);
          let d;
          try { d = JSON.parse(json); } catch(e) { console.error('Bad JSON:', e.message); process.exit(1); }
          const fs = require('fs');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `jobId=${d.jobId||''}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deviceId=${d.deviceId||''}\n`);
          fs.writeFileSync('/tmp/input_text.txt', d.text || '');
          console.log('Parsed jobId:', d.jobId, '| text chars:', (d.text||'').length);
          EOF

      # в”Җв”Җ Write "processing" immediately so UI shows progress spinner в”Җв”Җ
      - name: Write processing status
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          DEVICE="${{ steps.p.outputs.deviceId }}"
          mkdir -p api/status
          printf '{"jobId":"%s","deviceId":"%s","status":"processing","template":"imggen","total":0,"done":0,"label":"Processing\u2026","timestamp":%s,"results":[]}' \
            "$JOB_ID" "$DEVICE" "$(date +%s)000" > "api/status/${JOB_ID}.json"
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || (git commit -m "start: ${JOB_ID} [skip ci]" && git push)

      - name: Write generator script
        run: |
          cat > /tmp/gen.mjs << 'JSEOF'
          import fs from 'fs';

          const jobId    = process.env.JOB_ID;
          const text     = fs.readFileSync('/tmp/input_text.txt', 'utf8').trim();
          const deviceId = process.env.DEVICE_ID;
          const worker   = process.env.WORKER_URL;

          if (!jobId || !text) { console.error('Missing jobId or text'); process.exit(1); }
          if (!worker)         { console.error('Missing WORKER_URL secret'); process.exit(1); }

          // в”Җв”Җ Fetch posts from Worker (pure JS split вҖ” no AI timeout) в”Җв”Җ
          let posts = [];
          try {
            const res  = await fetch(worker + '/ai', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Worker error ' + res.status);
            posts = data.posts || [];
            console.log('Worker returned ' + posts.length + ' post(s)');
          } catch(e) {
            console.error('Worker error:', e.message);
            process.exit(1);
          }
          if (!posts.length) { console.error('No posts from Worker'); process.exit(1); }

          // в”Җв”Җ Helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          const cleanText = t => (t||'').replace(/\*\*/g,'').trim();

          // Strip leading post numbers: "1." "1)" "(1)" "Post 1:" "з¬¬дёҖпјҡ" etc.
          function stripPostNumber(title) {
            return (title||'')
              .replace(/^\s*(?:post\s*)?\d+\s*[.:)\-]\s*/i, '')
              .replace(/^\s*\(\d+\)\s*/,                     '')
              .replace(/^\s*з¬¬\s*[\dдёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қеҚҒзҷҫ]+\s*[пјҡ:жқЎзҜҮйғЁеј иҠӮ]\s*/u, '')
              .replace(/^\s*[дёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қеҚҒ][гҖҒгҖӮпјҡ\s]/u, '')
              .replace(/^\s*#+\s*/,                          '')
              .trim();
          }

          // Decode HTML entities (e.g. &#128512; вҶ’ рҹҳҖ) the AI sometimes outputs
          function decodeEntities(str) {
            if (!str) return str;
            return str
              .replace(/&#(\d+);/g,           (_, n) => { try { return String.fromCodePoint(parseInt(n,10)); } catch { return ''; } })
              .replace(/&#x([0-9a-fA-F]+);/gi, (_, h) => { try { return String.fromCodePoint(parseInt(h,16)); } catch { return ''; } });
          }

          // в”Җв”Җ Normalise posts в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          posts = posts.map(p => ({
            title:   decodeEntities(stripPostNumber(p.title   || '')),
            content: (p.content || []).map(l => decodeEntities(l || '')),
          }));

          // в”Җв”Җ Bold: zodiac / planet / key words в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          const ZODIAC_WORDS = [
            // English
            'Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces',
            // Chinese (Simplified + Traditional)
            'зҷҪзҫҠеә§','йҮ‘зүӣеә§','еҸҢеӯҗеә§','е·Ёиҹ№еә§','зӢ®еӯҗеә§','еӨ„еҘіеә§','еӨ©з§Өеә§','еӨ©иқҺеә§','е°„жүӢеә§','ж‘©зҫҜеә§','ж°ҙз“¶еә§','еҸҢйұјеә§',
            'зүЎзҫҠеә§','йӣҷеӯҗеә§','зҚ…еӯҗеә§','иҷ•еҘіеә§','еӨ©и Қеә§','йӣҷйӯҡеә§',
            // Japanese
            'зүЎзүӣеә§','иҹ№еә§','д№ҷеҘіеә§','и Қеә§','еұұзҫҠеә§','йӯҡеә§',
            // Hindi/Marathi
            'аӨ®аҘҮаӨ·','аӨөаҘғаӨ·аӨӯ','аӨ®аӨҝаӨҘаҘҒаӨЁ','аӨ•аӨ°аҘҚаӨ•','аӨ•аӨ°аҘҚаӨ•аӨҹ','аӨёаӨҝаӨӮаӨ№','аӨ•аӨЁаҘҚаӨҜаӨҫ','аӨӨаҘҒаӨІаӨҫ','аӨөаҘғаӨ¶аҘҚаӨҡаӨҝаӨ•','аӨ§аӨЁаҘҒ','аӨ®аӨ•аӨ°','аӨ•аҘҒаӨӮаӨӯ','аӨ®аҘҖаӨЁ',
            // Tamil
            'а®®аҜҮа®·а®®аҜҚ','а®°а®ҝа®·а®Әа®®аҜҚ','а®®а®ҝа®ӨаҜҒа®©а®®аҜҚ','а®•а®ҹа®•а®®аҜҚ','а®ҡа®ҝа®®аҜҚа®®а®®аҜҚ','а®•а®©аҜҚа®©а®ҝ','а®ӨаҜҒа®Іа®ҫа®®аҜҚ','а®өа®ҝа®°аҜҒа®ҡаҜҚа®ҡа®ҝа®•а®®аҜҚ','а®Өа®©аҜҒа®ҡаҜҒ','а®®а®•а®°а®®аҜҚ','а®•аҜҒа®®аҜҚа®Әа®®аҜҚ','а®®аҜҖа®©а®®аҜҚ',
            // Malayalam
            'аҙ®аөҮаҙ·аҙӮ','аҙҮаҙҹаҙөаҙӮ','аҙ®аҙҝаҙҘаөҒаҙЁаҙӮ','аҙ•аөјаҙ•аөҚаҙ•аҙҹаҙ•аҙӮ','аҙҡаҙҝаҙҷаөҚаҙҷаҙӮ','аҙ•аҙЁаөҚаҙЁаҙҝ','аҙӨаөҒаҙІаҙҫаҙӮ','аҙөаөғаҙ¶аөҚаҙҡаҙҝаҙ•аҙӮ','аҙ§аҙЁаөҒ','аҙ®аҙ•аҙ°аҙӮ','аҙ•аөҒаҙӮаҙӯаҙӮ','аҙ®аөҖаҙЁаҙӮ',
            // Telugu
            'а°®аұҮа°·а°Ӯ','а°өаұға°·а°ӯа°Ӯ','а°®а°ҝа°ҘаұҒа°Ёа°Ӯ','а°•а°°аұҚа°•а°ҫа°ҹа°•а°Ӯ','а°ёа°ҝа°Ӯа°№а°Ӯ','а°•а°ЁаұҚа°Ҝ','а°ӨаұҒа°І','а°өаұға°¶аұҚа°ҡа°ҝа°•а°Ӯ','а°§а°ЁаұҒа°ёаұҚа°ёаұҒ','а°®а°•а°°а°Ӯ','а°•аұҒа°Ӯа°ӯа°Ӯ','а°®аұҖа°Ёа°Ӯ',
            // Kannada
            'аІ®аіҮаІ·','аІөаіғаІ·аІӯ','аІ®аІҝаІҘаіҒаІЁ','аІ•аІ°аіҚаІ•аІҫаІҹаІ•','аІёаІҝаІӮаІ№','аІ•аІЁаіҚаІҜаІҫ','аІӨаіҒаІІаІҫ','аІөаіғаІ¶аіҚаІҡаІҝаІ•','аІ§аІЁаіҒ','аІ®аІ•аІ°','аІ•аіҒаІӮаІӯ','аІ®аіҖаІЁ',
            // Bengali
            'аҰ®а§ҮаҰ·','аҰ¬а§ғаҰ·аҰӯ','аҰ®аҰҝаҰҘа§ҒаҰЁ','аҰ•аҰ°а§ҚаҰ•аҰҹ','аҰёаҰҝаҰӮаҰ№','аҰ•аҰЁа§ҚаҰҜаҰҫ','аҰӨа§ҒаҰІаҰҫ','аҰ¬а§ғаҰ¶а§ҚаҰҡаҰҝаҰ•','аҰ§аҰЁа§Ғ','аҰ®аҰ•аҰ°','аҰ•а§ҒаҰ®а§ҚаҰӯ','аҰ®а§ҖаҰЁ',
            // German
            'Widder','Stier','Zwillinge','Krebs','LГ¶we','Jungfrau','Waage','Skorpion','SchГјtze','Steinbock','Wassermann','Fische',
            // Spanish / French
            'Tauro','GГ©minis','CГЎncer','Sagitario','Capricornio','Acuario','Piscis',
            'BГ©lier','Taureau','GГ©meaux','Vierge','Balance','Scorpion','Sagittaire','Capricorne','Verseau','Poissons',
            // Arabic
            'Ш§Щ„ШӯЩ…Щ„','Ш§Щ„Ш«ЩҲШұ','Ш§Щ„Ш¬ЩҲШІШ§ШЎ','Ш§Щ„ШіШұШ·Ш§ЩҶ','Ш§Щ„ШЈШіШҜ','Ш§Щ„Ш№Ш°ШұШ§ШЎ','Ш§Щ„Щ…ЩҠШІШ§ЩҶ','Ш§Щ„Ш№ЩӮШұШЁ','Ш§Щ„ЩӮЩҲШі','Ш§Щ„Ш¬ШҜЩҠ','Ш§Щ„ШҜЩ„ЩҲ','Ш§Щ„ШӯЩҲШӘ',
          ];
          const PLANET_WORDS = [
            'Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Rahu','Ketu','Uranus','Neptune','Pluto',
            'аӨёаҘӮаӨ°аҘҚаӨҜ','аӨҡаӨӮаӨҰаҘҚаӨ°','аӨ®аӨӮаӨ—аӨІ','аӨ¬аҘҒаӨ§','аӨ—аҘҒаӨ°аҘҒ','аӨ¶аҘҒаӨ•аҘҚаӨ°','аӨ¶аӨЁаӨҝ','аӨ°аӨҫаӨ№аҘҒ','аӨ•аҘҮаӨӨаҘҒ',
            'еӨӘйҳі','жңҲдә®','зҒ«жҳҹ','ж°ҙжҳҹ','жңЁжҳҹ','йҮ‘жҳҹ','еңҹжҳҹ',
            'Sonne','Mond','Merkur','Jupiter','Venus','Saturn',
            'Ш§Щ„ШҙЩ…Ші','Ш§Щ„ЩӮЩ…Шұ','Ш§Щ„Щ…ШұЩҠШ®','Ш№Ш·Ш§ШұШҜ','Ш§Щ„Щ…ШҙШӘШұЩҠ','Ш§Щ„ШІЩҮШұШ©','ШІШӯЩ„',
          ];
          const _allSpecial = [...ZODIAC_WORDS, ...PLANET_WORDS]
            .sort((a,b) => b.length - a.length)
            .map(w => w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
          const SPECIAL_RE = new RegExp('(?<!\\*\\*)(' + _allSpecial.join('|') + ')(?!\\*\\*)', 'gu');
          const TIMING_RE  = /(?<!\*\*)\b(Today|Tomorrow|Lucky|Unlucky|Auspicious|Inauspicious|Important|Warning|Alert|Special|Excellent|Favorable|Unfavorable|Good|Bad|Critical|Best|Worst)\b(?!\*\*)/gi;

          function applyBold(t) {
            if (!t) return t;
            t = t.replace(SPECIAL_RE, '**$1**');
            t = t.replace(/(?<!\*)\b([A-Z]{3,})\b(?!\*)/g, '**$1**');
            t = t.replace(/(?<!\*)\b(\d+(?:\.\d+)?\s*[%вӮ№$вӮ¬ВЈ]|[вӮ№$вӮ¬ВЈ]\s*\d+(?:\.\d+)?|\d+(?:st|nd|rd|th))\b(?!\*)/g, '**$1**');
            t = t.replace(TIMING_RE, '**$1**');
            t = t.replace(/\*{4}/g,'**').replace(/\*\*(\s+)\*\*/g,'$1');
            return t;
          }

          posts = posts.map(p => ({
            title:   applyBold(p.title),
            content: p.content.map(l => l ? applyBold(l) : l),
          }));

          // в”Җв”Җ Emoji ensure: every non-empty line gets exactly one emoji в”Җв”Җв”Җв”Җ
          // KEY FIX: check if ANY emoji exists ANYWHERE in the line.
          // If yes вҶ’ leave line untouched (no duplicate emoji).
          // If no  вҶ’ append one relevant emoji at the end.
          const HAS_EMOJI_ANYWHERE = /\p{Emoji_Presentation}|\p{Emoji}\uFE0F/u;
          function topicEmoji(t) {
            const s = (t||'').toLowerCase();
            if (/aries|taurus|gemini|cancer|leo|virgo|libra|scorpio|sagittarius|capricorn|aquarius|pisces|зҷҪзҫҠ|йҮ‘зүӣ|еҸҢеӯҗ|е·Ёиҹ№|зӢ®еӯҗ|еӨ„еҘі|еӨ©з§Ө|еӨ©иқҺ|е°„жүӢ|ж‘©зҫҜ|ж°ҙз“¶|еҸҢйұј|аӨ®аҘҮаӨ·|аӨөаҘғаӨ·аӨӯ|аӨ®аӨҝаӨҘаҘҒаӨЁ|аӨ•аӨ°аҘҚаӨ•|аӨёаӨҝаӨӮаӨ№|zodiac|rashi|horoscope|rashifal/i.test(s)) return 'рҹ”®';
            if (/lucky|luck|fortune|auspicious|аӨ¶аҘҒаӨӯ|еҗү|аӨӯаӨҫаӨ—аҘҚаӨҜ/i.test(s))  return 'рҹҚҖ';
            if (/warning|caution|alert|danger|beware|аӨёаӨҫаӨөаӨ§аӨҫаӨЁ|жіЁж„Ҹ/i.test(s)) return 'вҡ пёҸ';
            if (/love|heart|romance|аӨӘаҘҚаӨ°аҘҮаӨ®|ж„ӣ|liebe|amour|relationship/i.test(s)) return 'вқӨпёҸ';
            if (/money|wealth|finance|earn|profit|аӨ§аӨЁ|й’ұ|geld|financial/i.test(s)) return 'рҹ’°';
            if (/health|fitness|body|аӨёаҘҚаӨөаӨҫаӨёаҘҚаӨҘаҘҚаӨҜ|еҒҘеә·|gesundheit/i.test(s)) return 'рҹ’Ә';
            if (/career|job|work|business|аӨ•аӨ°аӨҝаӨҜаӨ°|дәӢжҘӯ|karriere/i.test(s)) return 'рҹ’ј';
            if (/study|learn|education|аӨӘаӨўаӨј|еӯҰд№ |lernen|knowledge/i.test(s)) return 'рҹ“ҡ';
            if (/travel|journey|trip|аӨҜаӨҫаӨӨаҘҚаӨ°аӨҫ|ж—…иЎҢ|reise/i.test(s)) return 'вңҲпёҸ';
            if (/family|home|house|аӨӘаӨ°аӨҝаӨөаӨҫаӨ°|е®¶еәӯ|familie/i.test(s)) return 'рҹҸ ';
            if (/sun|solar|surya|аӨёаҘӮаӨ°аҘҚаӨҜ|еӨӘйҳі|sonne/i.test(s)) return 'вҳҖпёҸ';
            if (/moon|lunar|chandra|аӨҡаӨӮаӨҰаҘҚаӨ°|жңҲдә®|mond/i.test(s)) return 'рҹҢҷ';
            if (/fire|energy|passion|аӨңаҘӢаӨ¶|зҒ«|feuer/i.test(s)) return 'рҹ”Ҙ';
            if (/win|success|victory|аӨөаӨҝаӨңаӨҜ|жҲҗеҠҹ|erfolg/i.test(s)) return 'рҹҸҶ';
            if (/nature|flower|garden|аӨӘаҘҚаӨ°аӨ•аҘғаӨӨаӨҝ|иҮӘз„¶|natur/i.test(s)) return 'рҹҢё';
            return 'вңЁ';
          }
          function ensureEmoji(line) {
            if (!line || !line.trim()) return line;
            const plain = cleanText(line);
            // If line already has ANY emoji anywhere вҶ’ don't add another
            if (HAS_EMOJI_ANYWHERE.test(plain)) return line;
            // No emoji at all вҶ’ append one relevant emoji at the end
            return line.trimEnd() + ' ' + topicEmoji(plain);
          }
          posts = posts.map(p => ({
            title:   p.title,  // no emoji in title
            content: p.content.map(l => ensureEmoji(l)),
          }));

          // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
          // SVG RENDERER вҖ” based on reference implementation
          // Uses system emoji font stack: no CDN, no PNG embeds, always works.
          // Emoji are part of the text, rendered by 'Apple Color Emoji' etc.
          // renderLine handles **bold** markers only вҖ” simple, clean, correct.
          // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
          const EMOJI_FONT = `'Apple Color Emoji','Noto Color Emoji','Segoe UI Emoji','Segoe UI Symbol'`;
          const BASE_FONT  = `'Syne','DM Sans',ui-sans-serif,system-ui,sans-serif,${EMOJI_FONT}`;

          function xe(s) {
            return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
          }

          function parseBold(text) {
            const segs = [], re = /\*\*(.*?)\*\*/g;
            let last = 0, m;
            while ((m = re.exec(text)) !== null) {
              if (m.index > last) segs.push({ t: text.slice(last, m.index), bold: false });
              if (m[1])           segs.push({ t: m[1], bold: true });
              last = re.lastIndex;
            }
            if (last < text.length) segs.push({ t: text.slice(last), bold: false });
            return segs.filter(s => s.t);
          }

          // renderLine: bold-aware, emoji stays in text via font stack
          // No CDN, no splitSegments, no complex emoji logic вҖ” clean and correct.
          function renderLine(px, y, fs, fw, fill, rawText) {
            const segs    = parseBold(rawText);
            const hasBold = segs.some(s => s.bold);

            if (!hasBold) {
              return `<text x="${px}" y="${y}" font-family="${BASE_FONT}" font-size="${fs}" font-weight="${fw}" fill="${fill}" xml:space="preserve">${xe(cleanText(rawText))}</text>`;
            }
            const spans = segs.map(s => {
              const w = s.bold ? 900 : fw;
              const c = s.bold ? '#FFFFFF' : fill;
              return `<tspan font-weight="${w}" fill="${c}">${xe(s.t)}</tspan>`;
            }).join('');
            return `<text x="${px}" y="${y}" font-family="${BASE_FONT}" font-size="${fs}" font-weight="${fw}" fill="${fill}" xml:space="preserve">${spans}</text>`;
          }

          function isWide(ch) {
            const cp = ch.codePointAt(0);
            return (
              cp >= 0x1F000 ||
              (cp >= 0x2600  && cp <= 0x27FF) ||
              (cp >= 0x4E00  && cp <= 0x9FFF) ||
              (cp >= 0x3400  && cp <= 0x4DBF) ||
              (cp >= 0x20000 && cp <= 0x2FA1F)||
              (cp >= 0x3040  && cp <= 0x30FF) ||
              (cp >= 0xAC00  && cp <= 0xD7AF) ||
              (cp >= 0xFF00  && cp <= 0xFFEF) ||
              (cp >= 0x3000  && cp <= 0x303F) ||
              (cp >= 0x3200  && cp <= 0x33FF)
            );
          }
          function charVisLen(str) {
            let n = 0;
            for (const ch of [...(str||'')]) n += isWide(ch) ? 2 : 1;
            return n;
          }

          function wrapLatin(text, cpl) {
            const words = text.split(' '), lines = [];
            let cur = '', curLen = 0;
            for (const word of words) {
              const wLen = charVisLen(cleanText(word));
              const sep  = cur ? 1 : 0;
              if (curLen + sep + wLen > cpl && cur) { lines.push(cur); cur = word; curLen = wLen; }
              else { cur = cur ? `${cur} ${word}` : word; curLen += sep + wLen; }
            }
            if (cur) lines.push(cur);
            return lines.length ? lines : [''];
          }

          function wrapCJK(text, cpl) {
            const lines = []; let curRaw = '', curLen = 0, inBold = false;
            const chars = [...text]; let i = 0;
            while (i < chars.length) {
              if (chars[i] === '*' && chars[i+1] === '*') { curRaw += '**'; inBold = !inBold; i += 2; continue; }
              const ch = chars[i], chLen = isWide(ch) ? 2 : 1;
              if (curLen + chLen > cpl && cleanText(curRaw).length > 0) {
                if (inBold) curRaw += '**';
                lines.push(curRaw);
                curRaw = inBold ? '**' + ch : ch; curLen = chLen;
              } else { curRaw += ch; curLen += chLen; }
              i++;
            }
            if (cleanText(curRaw)) lines.push(curRaw);
            return lines.length ? lines : [''];
          }

          function smartWrap(text, cpl) {
            if (!text) return [''];
            const plain = cleanText(text);
            const wideCount  = [...plain].filter(isWide).length;
            const spaceCount = (plain.match(/ /g)||[]).length;
            const isCJK = wideCount > plain.length * 0.3 || (wideCount > 2 && spaceCount < 2);
            return isCJK ? wrapCJK(text, cpl) : wrapLatin(text, cpl);
          }

          // в”Җв”Җ Emoji-bullet helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          // If the FIRST character of a line is an emoji, treat it as a bullet.
          // Wrapped continuation lines indent to align text after the emoji.
          const LEAD_EMOJI_RE = /^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)\s*/u;

          function splitLeadEmoji(raw) {
            // Returns { bullet: 'рҹ”Ҙ ', rest: 'text...' } or { bullet: null, rest: raw }
            const plain = cleanText(raw || '');
            const m = LEAD_EMOJI_RE.exec(plain);
            if (!m) return { bullet: null, rest: raw };
            // bullet = emoji + space from original raw (preserve bold markers)
            const bulletChar = m[0];
            const rest = raw.slice(m[0].length).trimStart();
            return { bullet: bulletChar, rest };
          }

          async function makeSVG(post, imgIndex) {
            const W = 1080, H = 1920, PX = 110, PY = 130;
            const CW = W - PX * 2, BOTTOM = H - PY;

            const rawTitle = (post.title  || '').trim();
            const content  = (post.content|| []);
            const visLen   = charVisLen(cleanText(rawTitle)) + charVisLen(content.map(l=>cleanText(l||'')).join(''));

            let ts, bs, tlh, blh, gap;
            if      (visLen < 80)  { ts=96; bs=62; tlh=134; blh= 96; gap=76; }
            else if (visLen < 150) { ts=86; bs=55; tlh=120; blh= 88; gap=68; }
            else if (visLen < 260) { ts=74; bs=49; tlh=104; blh= 78; gap=58; }
            else if (visLen < 420) { ts=65; bs=44; tlh= 92; blh= 70; gap=50; }
            else if (visLen < 620) { ts=55; bs=40; tlh= 80; blh= 64; gap=44; }
            else if (visLen < 900) { ts=48; bs=35; tlh= 70; blh= 56; gap=36; }
            else                   { ts=41; bs=31; tlh= 60; blh= 50; gap=32; }

            // emoji bullet indent = approx 1.4x body font size (wider for emoji)
            const EMOJI_W = Math.round(bs * 1.45);

            const tCPL = Math.floor(CW / (ts * 0.50));
            const bCPL      = Math.floor(CW / (bs * 0.50));
            const bCPL_cont = Math.floor((CW - EMOJI_W) / (bs * 0.50)); // continuation after bullet

            const titleLines = smartWrap(rawTitle, tCPL);
            const bodyLines  = [];
            for (const line of content) {
              if (!cleanText(line||'')) { bodyLines.push({ raw:'', gap:true, indent:0 }); continue; }
              const { bullet, rest } = splitLeadEmoji(line);
              if (bullet) {
                // First wrapped line: emoji + rest (no indent on first)
                const wraps = smartWrap(rest, bCPL_cont);
                bodyLines.push({ raw: bullet + (wraps[0]||''), gap:false, indent:0, isBulletFirst:true, bulletW: EMOJI_W });
                for (let wi=1; wi<wraps.length; wi++) {
                  bodyLines.push({ raw: wraps[wi], gap:false, indent: EMOJI_W });
                }
              } else {
                for (const w of smartWrap(line, bCPL)) bodyLines.push({ raw:w, gap:false, indent:0 });
              }
            }

            const titleH = titleLines.length * tlh;
            const bodyH  = bodyLines.reduce((s,l) => s + (l.gap ? blh*0.5 : blh), 0);
            const totalH = titleH + (bodyLines.length ? gap + bodyH : 0);
            let y = totalH > (H - PY*2)
              ? PY + ts
              : Math.max(PY + ts, Math.round((H - totalH) / 2) + ts);

            const els = [];

            for (const line of titleLines) {
              if (y > BOTTOM + ts) break;
              els.push(renderLine(PX, y, ts, 800, '#FFFFFF', line));
              y += tlh;
            }

            if (bodyLines.length) {
              const ay = y + Math.round(gap * 0.28);
              if (ay < BOTTOM)
                els.push(`<rect x="${PX}" y="${ay}" width="44" height="4" rx="2" fill="rgba(139,92,246,0.75)"/>`);
              y += gap;
            }

            for (const line of bodyLines) {
              if (!line.gap && y > BOTTOM + bs) break;
              if (!line.gap) els.push(renderLine(PX + line.indent, y, bs, 400, 'rgba(255,255,255,0.85)', line.raw));
              y += line.gap ? Math.round(blh * 0.5) : blh;
            }

            // в”Җв”Җ Image number badge (top-right inside template) в”Җв”Җ
            const numLabel = String(imgIndex + 1);
            const numBadge = `<text x="${W - PX}" y="${PY - 20}" font-family="${BASE_FONT}" font-size="36" font-weight="700" fill="rgba(255,255,255,0.35)" text-anchor="end" xml:space="preserve">${numLabel}</text>`;

            const svgParts = [
              '<?xml version="1.0" encoding="UTF-8"?>',
              `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`,
              '<defs>',
              `  <linearGradient id="bg" x1="0" y1="0" x2="${W}" y2="${H}" gradientUnits="userSpaceOnUse">`,
              '  <stop offset="0%"   stop-color="#000000"/>',
              '  <stop offset="55%"  stop-color="#000000"/>',
              '  <stop offset="100%" stop-color="#000000"/>',
              '  </linearGradient>',
              `  <clipPath id="clip"><rect width="${W}" height="${H}"/></clipPath>`,
              '</defs>',
              `<rect width="${W}" height="${H}" fill="url(#bg)"/>`,
              '<g clip-path="url(#clip)">',
              numBadge,
              ...els,
              '</g>',
              '</svg>',
            ];
            return svgParts.join('\n');
          }

          // в”Җв”Җ Write results incrementally в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
          const dir = 'api/status';
          if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });

          const results = [];
          for (let i = 0; i < posts.length; i++) {
            const svg = await makeSVG(posts[i], i);
            results.push({ title: cleanText(posts[i].title), svg });
            const isLast = i === posts.length - 1;
            fs.writeFileSync(`${dir}/${jobId}.json`, JSON.stringify({
              jobId, deviceId,
              status:    isLast ? 'done' : 'processing',
              template:  'imggen',
              total:     posts.length,
              done:      i + 1,
              label:     cleanText(posts[0]?.title || 'Session').slice(0, 80),
              timestamp: Date.now(),
              results:   results.map(r => ({ title: r.title, svg: r.svg })),
            }));
            console.log(`Image ${i+1}/${posts.length} written`);
          }
          console.log('Done: ' + results.length + ' image(s)');
          JSEOF

      - name: Run generator
        env:
          JOB_ID:     ${{ steps.p.outputs.jobId }}
          DEVICE_ID:  ${{ steps.p.outputs.deviceId }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: node /tmp/gen.mjs

      - name: Commit status
        run: |
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || (git commit -m "job: ${{ steps.p.outputs.jobId }} [skip ci]" && git push)

      - name: Write error on failure
        if: failure()
        env:
          JOB_ID: ${{ steps.p.outputs.jobId }}
        run: |
          mkdir -p api/status
          node -e "
            const fs=require('fs'),j=process.env.JOB_ID;
            fs.writeFileSync('api/status/'+j+'.json', JSON.stringify({
              status:'error', jobId:j,
              error:'Image generation failed. Check Actions logs.',
              results:[], done:0, total:0, timestamp:Date.now()
            }));
          "
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || (git commit -m "err: ${JOB_ID} [skip ci]" && git push)
