name: Render Images

on:
  issue_comment:
    types: [created]

jobs:
  render:
    if: startsWith(github.event.comment.body, 'LUMA_IMG:')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Git config MUST come before any git operations
      - name: Git config
        run: |
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"

      - name: Parse payload
        id: p
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          node << 'EOF'
          const body = process.env.COMMENT_BODY;
          const json = body.slice(body.indexOf(':') + 1);
          let d;
          try { d = JSON.parse(json); } catch(e) { console.error('Bad JSON:', e.message); process.exit(1); }
          const fs = require('fs');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `jobId=${d.jobId||''}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deviceId=${d.deviceId||''}\n`);
          fs.writeFileSync('/tmp/input_text.txt', d.text || '');
          console.log('Parsed jobId:', d.jobId, '| text chars:', (d.text||'').length);
          EOF

      # Write processing status then push — pull+rebase handles parallel conflicts
      - name: Write processing status
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          DEVICE="${{ steps.p.outputs.deviceId }}"
          mkdir -p api/status
          node -e "
            const fs=require('fs');
            fs.writeFileSync('api/status/${JOB_ID}.json', JSON.stringify({
              jobId:'${JOB_ID}', deviceId:'${DEVICE}',
              status:'processing', template:'imggen',
              total:0, done:0, label:'Processing\u2026',
              timestamp:Date.now(), results:[]
            }));
          "
          for i in $(seq 1 8); do
            git add api/status/${JOB_ID}.json
            git diff --staged --quiet && echo "Nothing to commit" && break
            git commit -m "start: ${JOB_ID}" || true
            git pull --rebase origin main && git push && echo "Push ok" && break
            echo "Retry $i..." && sleep $((i * 3))
            git rebase --abort 2>/dev/null || true
          done

      - name: Write generator script
        run: |
          cat > /tmp/gen.mjs << 'JSEOF'
          import fs from 'fs';
          import { execSync } from 'child_process';

          const jobId    = process.env.JOB_ID;
          const text     = fs.readFileSync('/tmp/input_text.txt', 'utf8').trim();
          const deviceId = process.env.DEVICE_ID;
          const worker   = process.env.WORKER_URL;

          if (!jobId || !text) { console.error('Missing jobId or text'); process.exit(1); }
          if (!worker)         { console.error('Missing WORKER_URL secret'); process.exit(1); }

          let posts = [];
          try {
            const res  = await fetch(worker + '/ai', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Worker error ' + res.status);
            posts = data.posts || [];
            console.log('Worker returned ' + posts.length + ' post(s)');
          } catch(e) {
            console.error('Worker error:', e.message);
            process.exit(1);
          }
          if (!posts.length) { console.error('No posts from Worker'); process.exit(1); }

          const cleanText = t => (t||'').replace(/\*\*/g,'').trim();

          // ── Auto-bold important words in content ─────────────────────────────
          // Bolds: numbers+units, ALL-CAPS keywords, words after ":" label patterns,
          // key medical/financial/action terms. Works across all languages.
          function autoBoldImportant(text) {
            if (!text) return text;
            // Skip lines that already have bold markers
            if (text.includes('**')) return text;
            let t = text;
            // Numbers with units (universal)
            t = t.replace(/\b(\d[\d,\.]*\s*(?:%|kg|km|cm|mm|mg|ml|g\b|L\b|hr|hrs|min|sec|s\b|m\b|ft|lb|oz|K\b|M\b|B\b|cr|lakh|万|억|百|千|元|円|₹|€|\$|£|¥|years?|months?|weeks?|days?|hours?))\b/gi, '**$1**');
            // ALL-CAPS words (3+ letters) — skip common articles/prepositions
            const skipWords = new Set(['THE','AND','FOR','BUT','NOT','ARE','WAS','HAS','CAN','MAY','USE','DUE','PER','VIA','OUR','YOU','ALL','ANY','NEW','OLD','TOO','YET','ITS','HER','HIS','HOW','WHO','WHY','YES','NOW']);
            t = t.replace(/\b([A-Z][A-Z0-9]{2,})\b/g, (m) => skipWords.has(m) ? m : `**${m}**`);
            // Key-value pattern: "Label: value" → bold the value after colon
            t = t.replace(/:\s+([A-Z][^\n,;]{2,25})(?=[,;\n]|$)/g, (m, val) => ': **' + val.trim() + '**');
            return t;
          }

          function stripPostNumber(title) {
            return (title||'')
              .replace(/^\s*(?:post\s*)?\d+\s*[.:)\-]\s*/i, '')
              .replace(/^\s*\(\d+\)\s*/,                     '')
              .replace(/^\s*第\s*[\d一二三四五六七八九十百]+\s*[：:条篇部张节]\s*/u, '')
              .replace(/^\s*[一二三四五六七八九十][、。：\s]/u, '')
              .replace(/^\s*#+\s*/,                          '')
              .trim();
          }

          function decodeEntities(str) {
            if (!str) return str;
            return str
              .replace(/&#(\d+);/g,           (_, n) => { try { return String.fromCodePoint(parseInt(n,10)); } catch { return ''; } })
              .replace(/&#x([0-9a-fA-F]+);/gi, (_, h) => { try { return String.fromCodePoint(parseInt(h,16)); } catch { return ''; } });
          }

          posts = posts.map(p => ({
            title:   decodeEntities(stripPostNumber(p.title   || '')),
            content: (p.content || []).map(l => decodeEntities(l || '')),
          }));

          // ── Zodiac bold — all major languages ──
          // Simple regex, idempotent (won't double-bold already-bolded words)
          const ZODIAC_RE = /(?<!\*\*)(白羊座|牡羊座|金牛座|雙子座|双子座|巨蟹座|獅子座|狮子座|處女座|处女座|天秤座|天蠍座|天蝎座|射手座|摩羯座|水瓶座|雙魚座|双鱼座|牡牛座|蟹座|乙女座|蠍座|山羊座|魚座|الحمل|الثور|الجوزاء|السرطان|الأسد|العذراء|الميزان|العقرب|القوس|الجدي|الدلو|الحوت|মেষ|বৃষভ|মিথুন|কর্কট|সিংহ|কন্যা|তুলা|বৃশ্চিক|ধনু|মকর|কুম্ভ|মীন|ಮೇಷ|ವೃಷಭ|ಮಿಥುನ|ಕರ್ಕಾಟಕ|ಸಿಂಹ|ಕನ್ಯಾ|ತುಲಾ|ವೃಶ್ಚಿಕ|ಧನು|ಮಕರ|ಕುಂಭ|ಮೀನ|మేషం|వృషభం|మిథునం|కర్కాటకం|సింహం|కన్య|తుల|వృశ్చికం|ధనుస్సు|మకరం|కుంభం|మీనం|മേഷം|ഇടവം|മിഥുനം|കർക്കടകം|ചിങ്ങം|കന്നി|തുലാം|വൃശ്ചികം|ധനു|മകരം|കുംഭം|മീനം|மேஷம்|ரிஷபம்|மிதுனம்|கடகம்|சிம்மம்|கன்னி|துலாம்|விருச்சிகம்|தனுசு|மகரம்|கும்பம்|மீனம்|मेष|वृषभ|मिथुन|कर्क|कर्कट|सिंह|कन्या|तुला|वृश्चिक|धनु|मकर|कुंभ|मीन|Овен|Телец|Близнецы|Рак|Лев|Дева|Весы|Скорпион|Стрелец|Козерог|Водолей|Рыбы|Väduren|Oxen|Tvillingarna|Kräftan|Lejonet|Jungfrun|Vågen|Skorpionen|Skytten|Stenbocken|Vattumannen|Fiskarna|Væren|Tyren|Tvillingene|Krebsen|Løven|Jomfruen|Vægten|Stenbukken|Vandmanden|Fiskene|Baran|Byk|Bliźnięta|Rak|Lew|Panna|Waga|Skorpion|Strzelec|Koziorożec|Wodnik|Ryby|Koç|Boğa|İkizler|Yengeç|Aslan|Başak|Terazi|Akrep|Yay|Oğlak|Kova|Balık|Ram|Tweelingen|Kreeft|Leeuw|Maagd|Weegschaal|Schorpioen|Boogschutter|Steenbok|Waterman|Vissen|Ariete|Toro|Gemelli|Cancro|Leone|Vergine|Bilancia|Scorpione|Sagittario|Capricorno|Acquario|Pesci|Carneiro|Touro|Gêmeos|Gémeos|Caranguejo|Leão|Virgem|Balança|Escorpião|Sagitário|Capricórnio|Aquário|Peixes|Bélier|Taureau|Gémeaux|Vierge|Balance|Scorpion|Sagittaire|Capricorne|Verseau|Poissons|Widder|Stier|Zwillinge|Krebs|Löwe|Jungfrau|Waage|Skorpion|Schütze|Steinbock|Wassermann|Fische|Aries|Taurus|Gemini|Cancer|Leo|Virgo|Libra|Scorpio|Sagittarius|Capricorn|Aquarius|Pisces|Tauro|Géminis|Cáncer|Escorpio|Escorpión|Sagitario|Capricornio|Acuario|Piscis)(?!\*\*)/giu;

          function ensureZodiacBold(text) {
            if (!text) return text;
            return text.replace(ZODIAC_RE, '**$1**');
          }

          // Apply zodiac bold to title + all content lines
          posts = posts.map(p => ({
            title:   ensureZodiacBold(p.title),
            content: (p.content || []).map(l => l ? ensureZodiacBold(l) : l),
          }));

          const EMOJI_FONT = `'Apple Color Emoji','Noto Color Emoji','Segoe UI Emoji','Segoe UI Symbol'`;
          const BASE_FONT  = `'Syne','DM Sans',ui-sans-serif,system-ui,sans-serif,${EMOJI_FONT}`;

          // ── XML escape ───────────────────────────────────────────────────────────
          function xe(s) {
            return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
          }

          // ── Parse **bold** markers → segments ───────────────────────────────────
          function parseBold(text) {
            const segs = [], re = /\*\*(.*?)\*\*/g;
            let last = 0, m;
            while ((m = re.exec(text)) !== null) {
              if (m.index > last) segs.push({ t: text.slice(last, m.index), bold: false });
              if (m[1])           segs.push({ t: m[1], bold: true });
              last = re.lastIndex;
            }
            if (last < text.length) segs.push({ t: text.slice(last), bold: false });
            return segs.filter(s => s.t);
          }

          // ── Render one line — identical to reference, supports **bold** tspan ───
          function renderLine(px, y, ff, fs, fw, fill, rawText) {
            const segs = parseBold(rawText);
            const hasBold = segs.some(s => s.bold);
            if (!hasBold)
              return `<text x="${px}" y="${y}" font-family="${ff}" font-size="${fs}" font-weight="${fw}" fill="${fill}" xml:space="preserve">${xe(cleanText(rawText))}</text>`;
            const spans = segs.map(s =>
              `<tspan font-weight="${s.bold?900:fw}" fill="${s.bold?'#FFFFFF':fill}">${xe(s.t)}</tspan>`
            ).join('');
            return `<text x="${px}" y="${y}" font-family="${ff}" font-size="${fs}" font-weight="${fw}" fill="${fill}" xml:space="preserve">${spans}</text>`;
          }

          // ── Wide-char detection (CJK, emoji, fullwidth) ─────────────────────────
          function isWide(ch) {
            const cp = ch.codePointAt(0);
            return (
              cp >= 0x1F000 ||
              (cp >= 0x2600 && cp <= 0x27FF) ||
              (cp >= 0xFE00 && cp <= 0xFE0F) ||
              (cp >= 0x4E00 && cp <= 0x9FFF) ||
              (cp >= 0x3400 && cp <= 0x4DBF) ||
              (cp >= 0x20000 && cp <= 0x2FA1F) ||
              (cp >= 0x3040 && cp <= 0x30FF) ||
              (cp >= 0xAC00 && cp <= 0xD7AF) ||
              (cp >= 0x1100 && cp <= 0x11FF) ||
              (cp >= 0xFF00 && cp <= 0xFFEF) ||
              (cp >= 0x3000 && cp <= 0x303F) ||
              (cp >= 0x3200 && cp <= 0x33FF)
            );
          }

          function charVisLen(str) {
            let n = 0;
            for (const ch of [...(str||'')]) n += isWide(ch) ? 2 : 1;
            return n;
          }

          // ── Word wrap ────────────────────────────────────────────────────────────
          function wrapLatin(text, cpl) {
            const words = text.split(' '), lines = [];
            let cur = '', curLen = 0;
            for (const word of words) {
              const wLen = charVisLen(cleanText(word)), sep = cur ? 1 : 0;
              if (curLen + sep + wLen > cpl && cur) { lines.push(cur); cur = word; curLen = wLen; }
              else { cur = cur ? `${cur} ${word}` : word; curLen += sep + wLen; }
            }
            if (cur) lines.push(cur);
            return lines.length ? lines : [''];
          }

          function wrapCJK(text, cpl) {
            const lines = []; let curRaw = '', curLen = 0, inBold = false;
            const chars = [...text]; let i = 0;
            while (i < chars.length) {
              if (chars[i] === '*' && chars[i+1] === '*') { curRaw += '**'; inBold = !inBold; i += 2; continue; }
              const ch = chars[i], chLen = isWide(ch) ? 2 : 1;
              if (curLen + chLen > cpl && cleanText(curRaw).length > 0) {
                if (inBold) curRaw += '**';
                lines.push(curRaw);
                curRaw = inBold ? '**' + ch : ch; curLen = chLen;
              } else { curRaw += ch; curLen += chLen; }
              i++;
            }
            if (cleanText(curRaw)) lines.push(curRaw);
            return lines.length ? lines : [''];
          }

          function smartWrap(text, cpl) {
            if (!text) return [''];
            const plain = cleanText(text);
            const wideCount  = [...plain].filter(isWide).length;
            const spaceCount = (plain.match(/ /g) || []).length;
            const isCJK = wideCount > plain.length * 0.3 || (wideCount > 2 && spaceCount < 2);
            return isCJK ? wrapCJK(text, cpl) : wrapLatin(text, cpl);
          }

          // ── Detect a leading emoji codepoint at the very start of a string ──────
          // Returns the emoji string, or null if line does not start with an emoji
          function getLeadingEmoji(str) {
            // Work on the raw string (not cleanText — we need the original position)
            const s = (str || '').trimStart();
            // Match one emoji cluster (base + optional variation selector + optional keycap)
            const m = s.match(/^(\p{Extended_Pictographic}[\uFE0F\u20E3]?)/u);
            return m ? m[0] : null;
          }

          // ── Main SVG generator ───────────────────────────────────────────────────
          // Identical to reference except:
          //   1. Background = solid #000000 (not gradient)
          //   2. Lines starting with an emoji use two-column layout:
          //      • emoji stays at PX (left column)
          //      • text starts at PX + emojiWidth + gap (right column)
          //      • continuation lines wrap under the TEXT column, not under the emoji
          async function makeSVG(post) {
            const W = 1080, H = 1920;
            // 2cm margin at 96dpi ≈ 75px. At 1080px wide, ~75px = ~7% of width.
            // We use 75px top/bottom margin, 90px left/right for breathing room.
            const PX = 90, PY = 75;
            const CW = W - PX * 2, BOTTOM = H - PY;

            const rawTitle = (post.title || '').trim();
            const content  = (post.content || []);

            // Auto-bold important words in content lines
            const contentBolded = content.map(l => autoBoldImportant(l || ''));

            // Content length for font-size decisions (exclude title from body calc)
            const bodyLen = charVisLen(contentBolded.map(l => cleanText(l||'')).join(''));
            const titleLen = charVisLen(cleanText(rawTitle));

            // TITLE: always H1-sized — large, dominant. Shrinks only if title itself is very long.
            // BODY: sizes based on total body content to fill the available space.
            let ts, bs, tlh, blh, gap;
            if      (titleLen <= 20 && bodyLen < 100)  { ts=130; bs=68; tlh=175; blh=100; gap=90; }
            else if (titleLen <= 30 && bodyLen < 200)  { ts=118; bs=60; tlh=158; blh=90;  gap=80; }
            else if (titleLen <= 40 && bodyLen < 350)  { ts=106; bs=54; tlh=142; blh=80;  gap=72; }
            else if (titleLen <= 55 && bodyLen < 550)  { ts=94;  bs=48; tlh=126; blh=72;  gap=64; }
            else if (titleLen <= 70 && bodyLen < 800)  { ts=82;  bs=43; tlh=112; blh=64;  gap=56; }
            else if (bodyLen < 1100)                   { ts=72;  bs=38; tlh=98;  blh=56;  gap=48; }
            else if (bodyLen < 1500)                   { ts=62;  bs=34; tlh=86;  blh=50;  gap=42; }
            else                                       { ts=54;  bs=30; tlh=74;  blh=44;  gap=36; }

            const tCPL = Math.floor(CW / (ts * 0.52));
            const bCPL = Math.floor(CW / (bs * 0.52));

            // Title lines
            const titleLines = smartWrap(rawTitle, tCPL);

            // Body lines — emoji bullet two-column layout
            const bodyLines = [];
            for (const line of contentBolded) {
              const raw = line || '';
              if (!cleanText(raw)) {
                bodyLines.push({ raw: '', gap: true, px: PX });
                continue;
              }
              const em = getLeadingEmoji(raw);
              if (em) {
                const emColPx  = Math.round(bs * 1.3) + Math.round(bs * 0.25);
                const textPX   = PX + emColPx;
                const textCW   = W - textPX - PX;
                const textCPL  = Math.floor(textCW / (bs * 0.52));
                const rest     = raw.slice(raw.indexOf(em) + em.length).trimStart();
                const wrapped  = smartWrap(rest || '', textCPL);
                bodyLines.push({ raw: em,             gap: false, px: PX,     sameY: true  });
                bodyLines.push({ raw: wrapped[0]||'', gap: false, px: textPX, sameY: false });
                for (let wi = 1; wi < wrapped.length; wi++)
                  bodyLines.push({ raw: wrapped[wi], gap: false, px: textPX, sameY: false });
              } else {
                for (const w of smartWrap(raw, bCPL))
                  bodyLines.push({ raw: w, gap: false, px: PX });
              }
            }

            // Vertical centering — content fills between 2cm margins
            const titleH = titleLines.length * tlh;
            const bodyH  = bodyLines.reduce((s, l) => {
              if (l.sameY) return s;
              return s + (l.gap ? blh * 0.5 : blh);
            }, 0);
            const totalH = titleH + (bodyLines.length ? gap + bodyH : 0);
            let y = totalH > (H - PY * 2)
              ? PY + ts
              : Math.max(PY + ts, Math.round((H - totalH) / 2) + ts);

            const els = [];

            // Title — H1, always large, white, bold
            for (const line of titleLines) {
              if (y > BOTTOM + ts) break;
              els.push(renderLine(PX, y, BASE_FONT, ts, 800, '#FFFFFF', line));
              y += tlh;
            }

            // Accent bar under title
            if (bodyLines.length) {
              const ay = y + Math.round(gap * 0.28);
              if (ay < BOTTOM)
                els.push('<rect x="' + PX + '" y="' + ay + '" width="44" height="4" rx="2" fill="rgba(139,92,246,0.75)"/>');
              y += gap;
            }

            // Body content — auto-sized, important words bolded
            for (const line of bodyLines) {
              if (!line.gap && !line.sameY && y > BOTTOM + bs) break;
              if (!line.gap)
                els.push(renderLine(line.px, y, BASE_FONT, bs, 400, 'rgba(255,255,255,0.85)', line.raw));
              if (!line.sameY)
                y += line.gap ? Math.round(blh * 0.5) : blh;
            }

            // Final SVG
            const svgLines = [
              '<?xml version="1.0" encoding="UTF-8"?>',
              '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">',
              '<defs>',
              '  <clipPath id="clip"><rect width="' + W + '" height="' + H + '"/></clipPath>',
              '</defs>',
              '<rect width="' + W + '" height="' + H + '" fill="#000000"/>',
              '<g clip-path="url(#clip)">',
              ...els,
              '</g>',
              '</svg>',
            ];
            return svgLines.join('\n');
          }

          const dir='api/status';
          fs.mkdirSync(dir,{recursive:true});

          // Write each image as a SEPARATE file: api/status/{jobId}/{i}.json
          // The index file api/status/{jobId}.json holds status + titles only (no SVG blobs)
          // This prevents the index file from hitting GitHub's 100MB limit with large batches
          fs.mkdirSync(`${dir}/${jobId}`, {recursive:true});

          const results=[];
          const label = cleanText(posts[0]?.title||'Session').slice(0,80);

          function writeIndex(done, status) {
            fs.writeFileSync(`${dir}/${jobId}.json`, JSON.stringify({
              jobId, deviceId,
              status,
              template: 'imggen',
              total: posts.length,
              done,
              label,
              timestamp: Date.now(),
              // results array has title + svgFile path (not inline SVG) for large batches
              // BUT for compatibility we also inline SVG for first 6 images
              results: results.map((r,i) => ({
                title: r.title,
                svg: r.svg,          // always inline — frontend expects this
              })),
            }));
          }

          // Helper: git add + commit + push (with retry)
          function gitPush(msg) {
            for (let attempt = 1; attempt <= 6; attempt++) {
              try {
                execSync(`git add api/status/${jobId}.json`, {stdio:'pipe'});
                try { execSync(`git commit -m "${msg}"`, {stdio:'pipe'}); } catch {}
                execSync('git pull --rebase origin main', {stdio:'pipe'});
                execSync('git push', {stdio:'pipe'});
                console.log('Pushed:', msg);
                return;
              } catch(e) {
                console.log(`Push retry ${attempt}:`, e.message?.slice(0,80));
                try { execSync('git rebase --abort', {stdio:'pipe'}); } catch {}
                const wait = attempt * 2000;
                await new Promise(r => setTimeout(r, wait));
              }
            }
          }

          for(let i=0;i<posts.length;i++){
            const svg=await makeSVG(posts[i]);
            results.push({title:cleanText(posts[i].title), svg});
            const isLast = i===posts.length-1;
            writeIndex(i+1, isLast?'done':'processing');
            console.log(`Image ${i+1}/${posts.length} written (SVG: ${svg.length} bytes)`);
            // Push after every image so frontend sees results as they generate
            await gitPush(`img ${i+1}/${posts.length}: ${jobId}`);
          }
          console.log('Done: '+results.length+' image(s)');
          JSEOF

      - name: Run generator
        env:
          JOB_ID:     ${{ steps.p.outputs.jobId }}
          DEVICE_ID:  ${{ steps.p.outputs.deviceId }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: node /tmp/gen.mjs

      # Safety-net push — catches anything the in-loop push may have missed
      - name: Commit and push result
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          for i in $(seq 1 5); do
            git add api/status/${JOB_ID}.json
            git diff --staged --quiet && echo "Nothing new to commit" && break
            git commit -m "final: ${JOB_ID}" || true
            git pull --rebase origin main && git push && echo "Final push ok" && break
            echo "Retry $i..." && sleep $((i * 2))
            git rebase --abort 2>/dev/null || true
          done

      # On any failure — write error file and push it
      - name: Write error on failure
        if: failure()
        env:
          JOB_ID: ${{ steps.p.outputs.jobId }}
        run: |
          JOB_ID="${{ steps.p.outputs.jobId }}"
          mkdir -p api/status
          node -e "
            const fs=require('fs'),j='${JOB_ID}';
            fs.writeFileSync('api/status/'+j+'.json',JSON.stringify({
              status:'error',jobId:j,
              error:'Generation failed — check Actions logs.',
              results:[],done:0,total:0,timestamp:Date.now()
            }));
            console.log('Error status written for',j);
          "
          for i in $(seq 1 8); do
            git add api/status/${JOB_ID}.json
            git diff --staged --quiet && break
            git commit -m "err: ${JOB_ID}" || true
            git pull --rebase origin main && git push && echo "Error push ok" && break
            echo "Error retry $i..." && sleep $((i * 3))
            git rebase --abort 2>/dev/null || true
          done
